<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドキドキ！どはでインターバルタイマー</title>
  <meta name="description" content="小学校の授業や家庭学習で使える、ド派手な演出と音で楽しむワクワク・ドキドキのインターバルタイマーです。">
  <!-- Google Fonts: Noto Serif JP (エヴァ特太明朝用), Orbitron (数字用), M PLUS Rounded 1c (子供向け日本語用), Outfit (UI用) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Noto+Serif+JP:wght@900&family=Orbitron:wght@600;900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================================================
       NERV公式風「メカニカルSVGタイマー」デザインシステム & スタイリング
       ========================================================================== */

    @font-face {
      font-family: 'digital7_mono';
      src: url('./NERV-timer-main/NERV-timer-main/src/fonts/digital7_mono.woff2') format('woff2'),
           url('./NERV-timer-main/NERV-timer-main/src/fonts/digital7_mono.woff') format('woff'),
           url('./NERV-timer-main/NERV-timer-main/src/fonts/digital7_mono.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg-color: #000000;
      --bg-gradient: radial-gradient(circle at center, #100600 0%, #000000 100%);
      --card-bg: rgba(14, 6, 2, 0.85);
      --card-border: rgba(255, 85, 0, 0.2);
      --text-primary: #ffffff;
      --text-secondary: #a89484; /* エヴァ特有 of ベージュグレー */
      --text-muted: #5e4f45;
      
      /* エヴァ警告カラー */
      --eva-orange: #ff5500;
      --eva-orange-glow: rgba(255, 85, 0, 0.45);
      --eva-red: #ff003c;
      --eva-red-glow: rgba(255, 0, 60, 0.55);
      --eva-yellow: #ffd200;
      --eva-green: #00ff66;
      
      --active-color: var(--eva-orange);
      --active-glow: var(--eva-orange-glow);
      
      --font-timer: 'digital7_mono', monospace;
      --font-eva: 'Noto Serif JP', serif; /* 極太明朝体 */
      --font-ui: 'M PLUS Rounded 1c', sans-serif;
      
      --transition-smooth: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      --border-radius-lg: 4px;
      --border-radius-md: 4px;
      --border-radius-sm: 2px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* フルスクリーン背景 */
    :fullscreen,
    :fullscreen * {
      background-color: #000000 !important;
    }

    ::backdrop {
      background-color: #000000 !important;
    }

    html, body {
      background: var(--bg-color) !important;
      background-image: var(--bg-gradient) !important;
      font-family: var(--font-ui);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.3s ease;
    }

    /* 背景アニメーションキャンバス */
    .ambient-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.45;
    }

    /* 通常の残り10秒パルス */
    @keyframes body-heartbeat {
      0% {
        box-shadow: inset 0 0 50px rgba(255, 0, 60, 0);
        background-color: rgba(255, 0, 60, 0);
      }
      50% {
        box-shadow: inset 0 0 100px rgba(255, 0, 60, 0.35);
        background-color: rgba(255, 0, 60, 0.06);
      }
      100% {
        box-shadow: inset 0 0 50px rgba(255, 0, 60, 0);
        background-color: rgba(255, 0, 60, 0);
      }
    }

    body.pulse-active {
      animation: body-heartbeat 1.0s infinite ease-in-out;
    }

    .app-container {
      width: 100%;
      max-width: 1600px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 40px;
      position: relative;
      z-index: 1;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--card-border);
      margin-bottom: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 1.8rem;
      filter: drop-shadow(0 0 10px var(--eva-orange));
      animation: pulse-icon 2.5s infinite alternate ease-in-out;
    }

    @keyframes pulse-icon {
      0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--eva-orange-glow)); }
      100% { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--eva-orange)); }
    }

    .logo-text {
      font-size: 1.6rem;
      font-weight: 900;
      font-family: var(--font-eva);
      color: var(--eva-orange);
      letter-spacing: 3px;
      text-shadow: 0 0 15px var(--eva-orange-glow);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* 音量調整 */
    .volume-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 85, 0, 0.05);
      padding: 6px 12px;
      border-radius: 0;
      border: 1px solid var(--card-border);
    }

    .volume-control input[type="range"] {
      width: 80px;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 85, 0, 0.15);
      outline: none;
      cursor: pointer;
    }

    .volume-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--eva-orange);
      box-shadow: 0 0 8px var(--eva-orange-glow);
      transition: transform 0.1s;
    }

    .volume-control input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    /* メインエリア */
    .app-main {
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 40px;
      align-items: start;
    }

    /* ==========================================================================
       NERVメカニカルSVGタイマーセクション
       ========================================================================== */
    .timer-section {
      background: #000000;
      border: 1px solid rgba(255, 85, 0, 0.15);
      border-radius: var(--border-radius-lg);
      width: 100%;
      aspect-ratio: 903 / 551;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
      container-type: both;
    }

    /* メカニカルSVGフレーム */
    svg#clock-main-shape {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* SVGフレームのカラー適用 */
    #clock-frame path, #clock-frame polygon {
      fill: none;
      stroke: var(--active-color);
      stroke-width: 1px;
      opacity: 0.15;
    }
    
    /* 外枠太線 */
    #clock-lines .cls-3 {
      stroke: var(--active-color);
      stroke-width: 3px;
      filter: drop-shadow(0px 0px 4px var(--active-glow));
      transition: stroke 0.3s ease;
    }

    /* デコパーツ */
    #clock-lines .cls-4 {
      fill: var(--active-color);
      transition: fill 0.3s ease;
    }
    
    #deco-black g rect, #deco-black rect {
      fill: #0c0502;
    }
    
    #deco-bg-lines rect, #deco-bg-lines polyline {
      fill: none;
      stroke: var(--active-color);
      stroke-width: 1px;
      opacity: 0.25;
    }
    
    /* 意味ありげな極小文字表示 */
    #clock-lines text {
      fill: var(--active-color);
      opacity: 0.45;
      font-family: monospace;
      font-size: 7px;
    }

    /* 7セグデジタル時計表示 */
    #bigClock {
      font-family: var(--font-timer);
      position: absolute;
      z-index: 5;
      width: auto;
      display: flex;
      align-items: flex-baseline;
      box-sizing: border-box;
      top: 23.6%;
      left: 19.5%;
      color: var(--active-color);
      text-shadow: 0px 0px 1.5cqw var(--active-color);
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    #bigClock span {
      display: inline-block;
      font-size: 16.6cqw;
      line-height: 1;
      letter-spacing: -0.2cqw;
    }

    .clocktitleimg {
      position: absolute;
      z-index: 6;
      top: -4.8cqh;
      left: -9.5cqw;
      width: 22cqw;
      filter: drop-shadow(0 0 5px var(--active-glow));
    }

    span#clockSecond {
      font-size: 7cqw !important;
      margin-left: 0.5cqw;
    }

    span.clockSeparator {
      margin-left: -3cqw !important;
      margin-right: -3cqw !important;
    }

    span.clockSeparator.seconds {
      font-size: 7cqw !important;
      margin-left: -1.2cqw !important;
      margin-right: -1cqw !important;
    }

    /* 警告プレート型操作ボタンエリア */
    div#databoxes {
      position: absolute;
      z-index: 10;
      bottom: 26.3%;
      left: 21.6%;
      display: flex;
      gap: 1.5cqw;
    }

    .bottombox {
      cursor: pointer;
      display: block;
      border: 1px solid var(--active-color);
      background: #000000;
      color: var(--active-color);
      height: 5.4cqh;
      width: auto;
      min-width: 10cqw;
      text-align: center;
      border-radius: 0;
      padding: 0.6cqh 1.2cqw;
      font-size: 1.5cqw;
      font-weight: 900;
      font-family: var(--font-ui);
      letter-spacing: 1px;
      transition: var(--transition-smooth);
      text-shadow: 0px 0px 0.8cqw var(--active-color);
    }

    .bottombox:hover {
      background: var(--active-color);
      color: #000000;
      text-shadow: none;
      box-shadow: 0 0 15px var(--active-glow);
    }
    
    .bottombox:active {
      transform: scale(0.96);
    }

    /* ボタンアクティブ時の下部警告ランプ */
    .bottombox.active {
      background: #150500;
      border-color: var(--eva-red);
      color: var(--eva-red);
      text-shadow: 0 0 1cqw var(--eva-red);
      animation: alert-flash 0.8s infinite alternate;
    }

    .bottombox.active::after {
      content: '';
      display: block;
      background: var(--eva-red);
      width: 100%;
      height: 3px;
      position: relative;
      bottom: -4px;
      box-shadow: 0 0 8px var(--eva-red);
    }

    /* 日付表示 */
    #date {
      position: absolute;
      color: #000000;
      bottom: 3.6%;
      right: 8.8%;
      text-align: right;
      background: var(--active-color);
      padding: 0.2cqh 0.8cqw;
      font-family: var(--font-timer);
      font-size: 2.2cqw;
      letter-spacing: 0.5px;
      z-index: 5;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    /* 音声コントロールスピーカー */
    .audio_control {
      position: absolute;
      bottom: 3.6%;
      right: 3.1%;
      z-index: 5;
    }

    .audio_control img {
      transition: opacity .3s, filter .3s;
      opacity: .8;
      display: block;
      width: 2.5cqw;
      height: 2.5cqw;
      cursor: pointer;
      filter: drop-shadow(0 0 5px var(--active-glow));
    }

    .audio_control img:hover {
      opacity: 1;
      filter: drop-shadow(0 0 8px var(--active-color));
    }

    /* タスク表示 (上部余白) */
    .current-task-display {
      position: absolute;
      top: 4%;
      left: 5%;
      width: 90%;
      z-index: 5;
      text-align: left;
      margin-bottom: 0;
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 0;
      font-size: 1.2cqw;
      font-weight: 900;
      font-family: var(--font-eva);
      letter-spacing: 1.5px;
      background: #000000;
      border: 1.5px solid var(--active-color);
      color: var(--active-color);
      box-shadow: 0 0 10px var(--active-glow);
      transition: var(--transition-smooth);
    }

    .task-title {
      font-size: 3.2cqw;
      font-weight: 900;
      font-family: var(--font-eva);
      margin-top: 0.5cqh;
      letter-spacing: 2px;
      transition: var(--transition-smooth);
      color: #ffffff;
      text-shadow: 0 0 12px var(--active-glow);
    }

    /* 電源供給システムステータス (右側フレーム内) */
    .power-status-indicator {
      position: absolute;
      top: 24%;
      right: 5%;
      width: 20cqw;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-family: var(--font-timer);
      border-left: 2px solid var(--active-color);
      padding: 4px 0 4px 8px;
      background: rgba(0,0,0,0.4);
      z-index: 5;
      pointer-events: none;
    }

    .power-status-title {
      font-size: 1cqw;
      color: var(--text-secondary);
      letter-spacing: 1px;
      font-weight: 700;
    }

    .power-status-value {
      font-size: 1.2cqw;
      font-weight: 900;
      letter-spacing: 1px;
      color: var(--eva-green);
      text-shadow: 0 0 8px rgba(0, 255, 102, 0.5);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    body.internal-battery-mode .power-status-value {
      color: var(--eva-orange);
      text-shadow: 0 0 8px var(--eva-orange-glow);
      animation: alert-flash 1s infinite alternate;
    }

    /* 進行タイムライン (下部余白) */
    .timeline-container {
      position: absolute;
      bottom: 4%;
      left: 5%;
      width: 90%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 1cqw;
      background: rgba(0, 0, 0, 0.65);
      padding: 0.8cqh 1.8cqw;
      border-radius: 0;
      border: 1px solid rgba(255, 85, 0, 0.1);
      z-index: 5;
    }
    
    .timeline-step {
      display: flex;
      align-items: center;
      gap: 0.6cqw;
      padding: 0.4cqh 1cqw;
      border-radius: 0;
      font-size: 1.2cqw;
      font-family: var(--font-eva);
      font-weight: 900;
      transition: var(--transition-smooth);
      background: rgba(255, 85, 0, 0.02);
      border: 1px solid rgba(255, 85, 0, 0.1);
    }
    
    .timeline-step.past {
      opacity: 0.35;
      background: rgba(0, 0, 0, 0.4);
      text-decoration: line-through;
      border-color: rgba(255, 85, 0, 0.03);
    }
    
    .timeline-step.active {
      background: rgba(255, 85, 0, 0.1);
      border-color: var(--active-color);
      color: #ffffff;
      box-shadow: 0 0 10px var(--active-glow);
    }
    
    .timeline-step.future {
      opacity: 0.7;
    }
    
    .step-indicator {
      width: 1.8cqw;
      height: 1.8cqw;
      background: rgba(255, 85, 0, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1cqw;
      font-family: var(--font-ui);
      font-weight: bold;
    }
    
    .timeline-step.active .step-indicator {
      background: var(--active-color);
      color: #000000;
      font-weight: 900;
      box-shadow: 0 0 5px var(--active-color);
    }
    
    .timeline-connector {
      height: 1.5px;
      width: 2cqw;
      background: rgba(255, 85, 0, 0.1);
    }
    
    .timeline-connector.past {
      background: var(--active-color);
      opacity: 0.4;
    }

    /* 次のタスク予告と全画面ボタンはメインフレーム外部へ非表示 */
    .next-task-preview,
    #fullscreen-btn {
      display: none !important;
    }

    /* 一般ボタン */
    .ui-btn {
      background: rgba(255, 85, 0, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition-smooth);
    }

    .ui-btn:hover {
      background: rgba(255, 85, 0, 0.15);
      border-color: var(--eva-orange);
      box-shadow: 0 0 10px var(--eva-orange-glow);
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--eva-orange) 0%, #cc3300 100%);
      color: #ffffff;
      border: none;
      box-shadow: 0 4px 15px var(--eva-orange-glow);
    }

    .primary-btn:hover {
      background: linear-gradient(135deg, #ff6611 0%, #e63900 100%);
      box-shadow: 0 8px 25px var(--eva-orange-glow), 0 0 10px var(--eva-orange);
    }

    /* 設定エリア */
    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .settings-card {
      background: var(--card-bg);
      border: 2px solid var(--eva-orange);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      backdrop-filter: blur(15px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
    }

    .card-title {
      font-size: 1.15rem;
      font-family: var(--font-eva);
      font-weight: 900;
      color: var(--eva-orange);
      margin-bottom: 20px;
      border-left: 4px solid var(--eva-orange);
      padding-left: 12px;
      line-height: 1;
      letter-spacing: 1px;
    }

    /* プリセット */
    .preset-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .preset-btn {
      background: rgba(255, 85, 0, 0.02);
      border: 1px solid rgba(255, 85, 0, 0.15);
      border-radius: 0;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-align: left;
      transition: var(--transition-smooth);
    }

    .preset-btn:hover {
      background: rgba(255, 85, 0, 0.08);
      border-color: var(--eva-orange);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .preset-icon {
      font-size: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0;
    }

    .preset-info {
      display: flex;
      flex-direction: column;
    }

    .preset-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .preset-duration {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* スケジュールリスト */
    .schedule-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
      max-height: 250px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .schedule-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 85, 0, 0.1);
      border-radius: 0;
      padding: 10px 14px;
      transition: var(--transition-smooth);
    }

    .schedule-item.current-item {
      background: rgba(255, 85, 0, 0.05);
      border-color: var(--active-color);
      box-shadow: inset 3px 0 0 var(--active-color), 0 0 10px rgba(255, 255, 255, 0.02);
    }

    .schedule-item.theme-cyan { border-left: 4px solid var(--eva-orange); }
    .schedule-item.theme-magenta { border-left: 4px solid var(--eva-red); }
    .schedule-item.theme-yellow { border-left: 4px solid var(--eva-yellow); }
    .schedule-item.theme-green { border-left: 4px solid var(--eva-green); }

    .schedule-item-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .item-index {
      font-family: var(--font-timer);
      font-size: 0.8rem;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.02);
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .item-name {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .item-duration {
      font-family: var(--font-timer);
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 2px;
    }

    .schedule-item-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      transition: var(--transition-smooth);
    }

    .action-btn:hover {
      background: rgba(255, 85, 0, 0.15);
      color: var(--text-primary);
    }

    .delete-btn:hover {
      background: rgba(255, 0, 60, 0.2);
      color: var(--eva-red);
    }

    /* 追加フォーム */
    .add-task-form {
      border-top: 1px dashed rgba(255, 85, 0, 0.15);
      padding-top: 20px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .form-group.size-half {
      flex: 0.5;
    }

    .form-group label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 85, 0, 0.2);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 0.9rem;
      padding: 8px 12px;
      border-radius: 0;
      outline: none;
      transition: var(--transition-smooth);
    }

    .form-group input:focus {
      border-color: var(--eva-orange);
      box-shadow: 0 0 8px var(--eva-orange-glow);
    }

    .quick-time-buttons {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .quick-time-btn {
      background: rgba(255, 85, 0, 0.03);
      border: 1px solid rgba(255, 85, 0, 0.15);
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: 0;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .quick-time-btn:hover {
      background: rgba(255, 85, 0, 0.12);
      color: var(--text-primary);
    }

    .theme-picker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 12px;
      border-radius: 0;
      border: 1px solid rgba(255, 85, 0, 0.1);
    }

    .picker-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .theme-options {
      display: flex;
      gap: 10px;
    }

    .theme-radio {
      cursor: pointer;
      display: inline-block;
      position: relative;
      width: 20px;
      height: 20px;
    }

    .theme-radio input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .radio-dot {
      position: absolute;
      top: 0;
      left: 0;
      width: 20px;
      height: 20px;
      border-radius: 0;
      border: 1.5px solid transparent;
      transition: var(--transition-smooth);
    }

    .theme-radio.cyan .radio-dot { background-color: var(--eva-orange); }
    .theme-radio.magenta .radio-dot { background-color: var(--eva-red); }
    .theme-radio.yellow .radio-dot { background-color: var(--eva-yellow); }
    .theme-radio.green .radio-dot { background-color: var(--eva-green); }

    .theme-radio input:checked + .radio-dot {
      border-color: var(--text-primary);
      transform: scale(1.15);
      box-shadow: 0 0 8px var(--text-primary);
    }

    /* オプション */
    .option-items {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .option-switch {
      display: flex;
      align-items: center;
      position: relative;
      cursor: pointer;
    }

    .option-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch-slider {
      position: relative;
      width: 38px;
      height: 20px;
      background-color: rgba(255, 85, 0, 0.1);
      border: 1px solid rgba(255, 85, 0, 0.3);
      border-radius: 0;
      transition: .3s;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .switch-slider:before {
      position: absolute;
      content: "";
      height: 12px;
      width: 12px;
      left: 3px;
      bottom: 3px;
      background-color: var(--text-primary);
      border-radius: 0;
      transition: .3s;
    }

    .option-switch input:checked + .switch-slider {
      background-color: var(--eva-orange);
      border-color: var(--eva-orange);
    }

    .option-switch input:checked + .switch-slider:before {
      transform: translateX(18px);
    }

    .switch-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .sound-select-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      border-top: 1px dashed rgba(255, 85, 0, 0.15);
      padding-top: 12px;
    }

    .sound-select-group label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .sound-select-group select {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 85, 0, 0.25);
      color: var(--text-primary);
      padding: 6px 10px;
      border-radius: 0;
      outline: none;
      font-family: var(--font-ui);
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* ==========================================================================
       全画面モード (メカニカルフレーム最大化)
       ========================================================================== */
    body.fullscreen-mode {
      background: #000000 !important;
      padding: 0;
      overflow: hidden;
    }

    body.fullscreen-mode .app-header,
    body.fullscreen-mode .settings-section {
      display: none !important;
    }

    body.fullscreen-mode .app-container {
      padding: 0;
      max-width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent !important;
    }

    body.fullscreen-mode .app-main {
      grid-template-columns: 1fr;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent !important;
    }

    body.fullscreen-mode .timer-section {
      border: none;
      background: #000000 !important;
      box-shadow: none;
      width: 95vw;
      max-width: 95vw;
      height: auto;
      max-height: 95vh;
      aspect-ratio: 903 / 551;
    }

    /* 操作ヒントオーバーレイ */
    .fs-hint-overlay {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.95rem;
      color: rgba(255, 85, 0, 0.5);
      background: rgba(14, 5, 2, 0.9);
      border: 1px solid var(--eva-orange);
      padding: 8px 20px;
      border-radius: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      opacity: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      font-family: var(--font-ui);
      font-weight: bold;
    }

    .fs-hint-overlay.show {
      opacity: 1;
    }

    /* ==========================================================================
       エヴァ風警告ポップアップ
       ========================================================================== */
    .eva-alert-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 9999;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
    }

    .eva-alert-popup.active {
      animation: pop-eva-alert 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    @keyframes pop-eva-alert {
      0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
      8% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      12% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      85% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
    }

    .emergency-hex-container {
      position: relative;
      width: 440px;
      height: 380px;
      display: flex;
      justify-content: center;
      align-items: center;
      filter: drop-shadow(0 0 25px rgba(255, 0, 60, 0.75));
    }

    .emergency-hex {
      position: relative;
      width: 320px;
      height: 184.8px;
      background-color: var(--eva-red);
      margin: 92.4px 0;
      border-left: solid 8px #ffffff;
      border-right: solid 8px #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      font-family: var(--font-eva);
      box-shadow: 0 0 0 10px var(--eva-red);
    }

    .emergency-hex:before,
    .emergency-hex:after {
      content: "";
      position: absolute;
      left: -8px;
      width: 0;
      height: 0;
      border-left: 168px solid transparent;
      border-right: 168px solid transparent;
    }

    .emergency-hex:before { bottom: 184.8px; border-bottom: 92.4px solid var(--eva-red); }
    .emergency-hex:after { top: 184.8px; border-top: 92.4px solid var(--eva-red); }

    .hex-text-small {
      font-family: var(--font-ui);
      font-size: 0.95rem;
      letter-spacing: 4px;
      font-weight: 700;
      opacity: 0.95;
      color: #ffffff;
    }

    .hex-text-large {
      font-size: 3.2rem;
      font-weight: 900;
      margin: 8px 0;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255,255,255,0.4);
      white-space: nowrap;
      color: #ffffff;
    }

    /* 警告縞 */
    .hazard-stripe {
      background: repeating-linear-gradient(
        -45deg,
        var(--eva-yellow),
        var(--eva-yellow) 12px,
        #000000 12px,
        #000000 24px
      );
      height: 10px;
      border-bottom: 2.5px solid #000000;
    }

    /* ==========================================================================
       BEAST (暴走) モード用特殊エフェクト
       ========================================================================== */
    body.beast-active {
      animation: beast-alert-flash 0.4s infinite alternate, beast-screen-shake 0.08s infinite;
    }

    @keyframes beast-alert-flash {
      0% {
        background-color: #000000 !important;
        box-shadow: inset 0 0 40px rgba(255, 0, 60, 0.3);
      }
      100% {
        background-color: #1e0002 !important;
        box-shadow: inset 0 0 140px rgba(255, 0, 60, 0.9);
      }
    }

    @keyframes beast-screen-shake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, -2px); }
      80% { transform: translate(2px, 2px); }
      100% { transform: translate(-1px, 1px); }
    }

    body.beast-active #bigClock {
      animation: beast-glitch 0.12s infinite;
    }

    @keyframes beast-glitch {
      0% { filter: skew(0deg) brightness(1.2); transform: scale(1); }
      15% { filter: skew(4deg) brightness(1.8) contrast(1.3); transform: scale(1.03); }
      30% { filter: skew(-4deg) brightness(0.7); transform: scale(0.97); }
      45% { filter: skew(2deg) brightness(1.4); }
      70% { filter: skew(-2deg) brightness(0.9); }
      85% { filter: skew(5deg) brightness(1.6); }
      100% { filter: skew(0deg) brightness(1.2); }
    }

    body.beast-active .timer-section {
      border-color: var(--eva-red);
      box-shadow: 0 0 30px rgba(255, 0, 60, 0.4);
    }

    /* レスポンシブ対応 */
    @media (max-width: 992px) {
      .app-main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 576px) {
      .app-container {
        padding: 12px;
      }
      
      .app-header {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
      }
      
      .header-controls {
        justify-content: space-between;
      }
      
      .preset-buttons {
        grid-template-columns: 1fr;
      }
    }

</style>

    function debugLog(msg, color = null) {

    debugLog("🚀 インラインJavaScriptの実行を開始しました");

    // 1. 定数とデフォルト設定

      'study-break': [
        { nameKanji: '国語のお勉強', nameHiragana: 'こくごのおべんきょう', minutes: 10, seconds: 0, theme: 'theme-cyan' },
        { nameKanji: 'のびのび休憩', nameHiragana: 'のびのびやすみ', minutes: 5, seconds: 0, theme: 'theme-magenta' },
        { nameKanji: '算数のテスト', nameHiragana: 'さんすうのテスト', minutes: 2, seconds: 0, theme: 'theme-yellow' }
      ],
      'free-time': [
        { nameKanji: '自由時間！', nameHiragana: 'じゆうじかん！', minutes: 15, seconds: 0, theme: 'theme-green' },
        { nameKanji: 'おかたづけ', nameHiragana: 'おかたづけ', minutes: 3, seconds: 0, theme: 'theme-magenta' }
      ],
      'test': [
        { nameKanji: '漢字（テスト）', nameHiragana: 'かんじ（てすと）', minutes: 0, seconds: 10, theme: 'theme-cyan' },
        { nameKanji: '休憩（テスト）', nameHiragana: 'やすみ（てすと）', minutes: 0, seconds: 10, theme: 'theme-magenta' },
        { nameKanji: '計算（テスト）', nameHiragana: 'けいさん（てすと）', minutes: 0, seconds: 10, theme: 'theme-yellow' }
      ]
    };

    // 2. アプリケーション状態変数
    let tasks = [];
    let currentTaskIndex = 0;
    let remainingMs = 0;      // ミリ秒管理へ変更
    let totalDuration = 0;    // 秒単位
    let isPaused = true;
    let isHiragana = false;
    let volume = 0.7;
    let isMuted = false;
    let loopEnabled = true;
    let pulseEnabled = true;
    let countdownSoundEnabled = true;
    let isBeastMode = false;  // BEASTモードフラグ

    let timerId = null;
    let lastTimestamp = 0;
    
    let audioCtx = null;
    let beastAudio = null;    // 暴走BGMオーディオオブジェクト

    let particleCanvas, particleCtx;
    let ambientCanvas, ambientCtx;
    let particles = [];
    let ambientOrbs = [];
    let shockwaves = [];
    let animationFrameId = null;
    let flashOpacity = 0;

    const RING_CIRCUMFERENCE = 2 * Math.PI * 85;

    function initDOM() {
      DOM = {
        clockHour: document.getElementById('clockHour'),

        langToggleText: document.getElementById('lang-toggle-text'),

        pulseSwitch: document.getElementById('pulse-switch'),
        countdownSoundSwitch: document.getElementById('countdown-sound-switch'),
        chimeSelect: document.getElementById('chime-select'),
        timelineContainer: document.getElementById('timeline-container'),
        fsHintOverlay: document.getElementById('fs-hint-overlay'),
        powerStatusText: document.getElementById('power-status-text'),
        powerStatusValue: document.getElementById('power-status-value'),
        evaAlertPopup: document.getElementById('eva-alert-popup'),
        evaAlertText: document.getElementById('eva-alert-text')
      };
    }

    // 初期化
    window.addEventListener('DOMContentLoaded', () => {
      try {
        initDOM();
        setupCanvas();
        loadSettingsAndTasks();
        setupEventListeners();
        updateUI();
        animate();
        debugLog("🎉 システム起動完了！");
      } catch (err) {
        console.error("初期化エラー:", err);
      }
    });

    function setupCanvas() {
      particleCanvas = document.getElementById('particle-canvas');
      particleCtx = particleCanvas ? particleCanvas.getContext('2d') : null;
      
      ambientCanvas = document.getElementById('ambient-canvas');
      ambientCtx = ambientCanvas ? ambientCanvas.getContext('2d') : null;
      
      resizeCanvases();
      window.addEventListener('resize', resizeCanvases);
    }

    function resizeCanvases() {
      if (!particleCanvas || !ambientCanvas) return;
      
      const container = document.querySelector('.timer-section');
      if (!container) return;
      
      const rect = container.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      
      particleCanvas.width = rect.width * scale;
      particleCanvas.height = rect.height * scale;
      if (particleCtx) particleCtx.scale(scale, scale);
      
      ambientCanvas.width = window.innerWidth * scale;
      ambientCanvas.height = window.innerHeight * scale;
      if (ambientCtx) ambientCtx.scale(scale, scale);
    }

    function loadSettingsAndTasks() {
      const savedTasks = localStorage.getItem('intervaltimer_tasks');
      if (savedTasks) {
        try {
          tasks = JSON.parse(savedTasks);
          if (!Array.isArray(tasks) || tasks.length === 0) {
            tasks = [...DEFAULT_TASKS];
          }
        } catch (e) {
          tasks = [...DEFAULT_TASKS];
        }
      } else {
        tasks = [...DEFAULT_TASKS];
      }
      
      loopEnabled = localStorage.getItem('intervaltimer_loop') !== 'false';
      if (DOM.loopSwitch) DOM.loopSwitch.checked = loopEnabled;
      
      pulseEnabled = localStorage.getItem('intervaltimer_pulse') !== 'false';
      if (DOM.pulseSwitch) DOM.pulseSwitch.checked = pulseEnabled;

      countdownSoundEnabled = localStorage.getItem('intervaltimer_countdown_sound') !== 'false';
      if (DOM.countdownSoundSwitch) DOM.countdownSoundSwitch.checked = countdownSoundEnabled;

      const savedChime = localStorage.getItem('intervaltimer_chime');
      if (savedChime && DOM.chimeSelect) {
        DOM.chimeSelect.value = savedChime;
      }
      
      isHiragana = localStorage.getItem('intervaltimer_hiragana') === 'true';
      updateLanguageToggleUI();

      const savedVol = localStorage.getItem('intervaltimer_volume');
      if (savedVol !== null) {
        volume = parseFloat(savedVol);
        if (DOM.volumeSlider) DOM.volumeSlider.value = volume;
      }
      
      currentTaskIndex = 0;
      if (tasks.length > 0) {
        loadTask(0);
      }
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        debugLog("🔊 AudioContext を初期化しました");
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // 音響合成エンジン
    function playCymbalCrash(duration = 1.0, volumeVal = 0.22) {
      if (isMuted || volume === 0) return;
      try {
        initAudio();
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        
        const noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 1800;
        
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(volumeVal * volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        noiseNode.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        noiseNode.start();
        noiseNode.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.error(e);
      }
    }

    function playDrumKick(duration = 0.18, volumeVal = 0.5) {
      if (isMuted || volume === 0) return;
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(35, audioCtx.currentTime + duration);
        
        gainNode.gain.setValueAtTime(volumeVal * volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.error(e);
      }
    }

    function playTone(freq, duration, type = 'sine', gainVal = 0.5, slideTo = null) {
      if (isMuted || volume === 0) return;
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        if (slideTo) {
          osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
        }
        
        gainNode.gain.setValueAtTime(gainVal * volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.error(e);
      }
    }

    function playCountdownBeep(high = false) {
      const freq = high ? 1200 : 800;
      const dur = high ? 0.3 : 0.15;
      playTone(freq, dur, 'sine', 0.6);
    }

    function playSystemWarningBuzzer(duration = 0.4) {
      if (isMuted || volume === 0) return;
      try {
        initAudio();
        const baseFreq = 220;
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
        
        osc2.type = 'sawtooth';
        osc2.frequency.setValueAtTime(baseFreq + 4, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(0.4 * volume, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.4 * volume, audioCtx.currentTime + duration - 0.05);
        gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc1.connect(gainNode);
        osc2.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc1.start();
        osc2.start();
        osc1.stop(audioCtx.currentTime + duration);
        osc2.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.error(e);
      }
    }

    function playEvangellionBuzzerProgress() {
      playSystemWarningBuzzer(0.38);
      setTimeout(() => playSystemWarningBuzzer(0.38), 500);
      setTimeout(() => playSystemWarningBuzzer(0.38), 1000);
    }

    function playTransitionSound(type) {
      debugLog("🎵 効果音再生: " + type);
      switch (type) {
        case 'eva-buzzer':
          playEvangellionBuzzerProgress();
          break;
        case 'fanfare-heroic':
          playHeroicFanfare();
          break;
        case 'retro-game':
          playRetroGameSound();
          break;
        case 'school-bell':
          playSchoolBellSound();
          break;
        case 'magic-sparkle':
          playMagicSparkleSound();
          break;
        default:
          playEvangellionBuzzerProgress();
      }
    }

    function playHeroicFanfare() {
      initAudio();
      playCymbalCrash(1.6, 0.28);
      playDrumKick(0.2, 0.4);
      
      const progress = [
        { time: 0.0, notes: [261.63, 329.63, 392.00] },
        { time: 0.3, notes: [349.23, 440.00, 523.25] },
        { time: 0.6, notes: [392.00, 493.88, 587.33] },
        { time: 0.9, notes: [523.25, 659.25, 783.99, 1046.50] }
      ];
      
      progress.forEach(step => {
        step.notes.forEach(freq => {
          setTimeout(() => {
            const isLast = step.time === 0.9;
            const dur = isLast ? 1.6 : 0.35;
            const vol = isLast ? 0.18 : 0.15;
            playTone(freq, dur, 'sawtooth', vol);
            playTone(freq + 4, dur, 'sawtooth', vol);
            playTone(freq - 4, dur, 'sawtooth', vol);
            playTone(freq / 2, dur, 'sine', 0.25);
          }, step.time * 1000);
        });
      });
    }

    function playRetroGameSound() {
      initAudio();
      playDrumKick(0.25, 0.6);
      const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00];
      notes.forEach((freq, idx) => {
        setTimeout(() => {
          playTone(freq, 0.08, 'square', 0.22);
          playTone(freq * 1.5, 0.06, 'square', 0.08);
        }, idx * 45);
      });
    }

    function playSchoolBellSound() {
      initAudio();
      const notes = [349.23, 440.00, 392.00, 261.63];
      notes.forEach((freq, idx) => {
        setTimeout(() => {
          const partials = [
            { f: freq, g: 0.38, d: 2.2 },
            { f: freq * 2, g: 0.18, d: 1.6 },
            { f: freq * 3, g: 0.12, d: 1.2 },
            { f: freq * 4.25, g: 0.08, d: 0.8 }
          ];
          partials.forEach(p => {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(p.f, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(p.g * volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + p.d);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + p.d);
          });
        }, idx * 950);
      });
    }

    function playMagicSparkleSound() {
      initAudio();
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00, 2637.02, 3135.96, 4186.01];
      notes.forEach((freq, idx) => {
        setTimeout(() => {
          playTone(freq, 0.22, 'triangle', 0.15);
          playTone(freq * 1.02, 0.18, 'sine', 0.1);
        }, idx * 35);
      });
      
      const revNotes = [...notes].reverse();
      setTimeout(() => {
        revNotes.forEach((freq, idx) => {
          setTimeout(() => {
            playTone(freq * 1.5, 0.28, 'sine', 0.22);
          }, idx * 28);
        });
      }, 350);
    }

    // ハニカム背景
    let textScrollX = 0;
    
    function drawHoneycombGrid(ctx, w, h, size) {
      ctx.save();
      const isRedAlert = (remainingMs <= 10000 && !isPaused) || isBeastMode;
      ctx.strokeStyle = isRedAlert ? 'rgba(255, 0, 60, 0.15)' : 'rgba(255, 85, 0, 0.05)';
      ctx.lineWidth = 1;
      
      const hexWidth = size * Math.sqrt(3);
      const hexHeight = size * 2;
      
      for (let y = -hexHeight; y < h + hexHeight; y += hexHeight * 0.75) {
        let xOffset = 0;
        if (Math.floor(y / (hexHeight * 0.75)) % 2 !== 0) {
          xOffset = hexWidth / 2;
        }
        for (let x = -hexWidth; x < w + hexWidth; x += hexWidth) {
          drawHexagon(ctx, x + xOffset, y, size);
        }
      }
      ctx.restore();
    }

    function drawHexagon(ctx, x, y, size) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i;
        ctx.lineTo(x + size * Math.sin(angle), y + size * Math.cos(angle));
      }
      ctx.closePath();
      ctx.stroke();
    }

    function drawWarningScrollTexts(ctx, w, h) {
      ctx.save();
      const fontSize = 110;
      ctx.font = `900 ${fontSize}px var(--font-eva), sans-serif`;
      
      const isRedAlert = (remainingMs <= 10000 && !isPaused) || isBeastMode;
      ctx.fillStyle = isRedAlert ? 'rgba(255, 0, 60, 0.035)' : 'rgba(255, 85, 0, 0.008)';
      ctx.textBaseline = 'middle';
      
      textScrollX -= isBeastMode ? 2.5 : 0.6;
      if (textScrollX < -w * 2.5) textScrollX = 0;
      
      const text = isRedAlert ? "WARNING   EMERGENCY   活動限界   WARNING   EMERGENCY   活動限界   " : "SYSTEM ACTIVE   MONITORING   INTERNAL SYSTEM   MONITORING   ";
      
      ctx.fillText(text, textScrollX, h * 0.18);
      ctx.fillText(text, -textScrollX - w, h * 0.82);
      ctx.restore();
    }

    function drawAmbientBackground() {
      if (!ambientCtx) return;
      const scale = window.devicePixelRatio || 1;
      const w = ambientCanvas.width / scale;
      const h = ambientCanvas.height / scale;
      
      ambientCtx.clearRect(0, 0, w, h);
      drawHoneycombGrid(ambientCtx, w, h, 28);
      drawWarningScrollTexts(ambientCtx, w, h);
    }

    // パーティクル演出
    function spawnSpark(x, y, colorClass) {
      let color = '#ff5500';
      if (colorClass === 'theme-magenta') color = '#ff003c';
      if (colorClass === 'theme-yellow') color = '#ffd200';
      if (colorClass === 'theme-green') color = '#00ff66';
      
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 3 + 1;
      
      particles.push({
        type: Math.random() < 0.4 ? 'hex' : 'spark',
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: Math.random() * 8 + 4,
        rot: Math.random() * Math.PI,
        rotSpeed: 0.05,
        alpha: 1,
        decay: Math.random() * 0.025 + 0.015,
        color: color
      });
    }

    function spawnShockwave(x, y, colorClass) {
      let color = '#ff5500';
      if (colorClass === 'theme-magenta') color = '#ff003c';
      if (colorClass === 'theme-yellow') color = '#ffd200';
      if (colorClass === 'theme-green') color = '#00ff66';

      shockwaves.push({
        x: x,
        y: y,
        radius: 5,
        maxRadius: 190,
        lineWidth: 18,
        alpha: 1,
        color: color
      });
      
      for (let i = 0; i < 40; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 3;
        particles.push({
          type: 'hex',
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 12 + 6,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.12,
          alpha: 1,
          decay: Math.random() * 0.012 + 0.008,
          color: color
        });
      }

      for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        particles.push({
          type: 'noise',
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          width: Math.random() * 16 + 8,
          height: Math.random() * 8 + 4,
          alpha: 0.9,
          decay: Math.random() * 0.02 + 0.01,
          color: Math.random() < 0.5 ? '#ffffff' : color
        });
      }
      
      flashOpacity = 0.8;
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.alpha -= p.decay;
        
        if (p.rot !== undefined && p.rotSpeed !== undefined) {
          p.rot += p.rotSpeed;
        }
        
        if (p.alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      
      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const sw = shockwaves[i];
        sw.radius += (sw.maxRadius - sw.radius) * 0.15;
        sw.lineWidth *= 0.9;
        sw.alpha -= 0.05;
        
        if (sw.alpha <= 0 || sw.lineWidth < 0.5) {
          shockwaves.splice(i, 1);
        }
      }
      
      if (flashOpacity > 0) {
        flashOpacity -= 0.04;
      }
    }

    function drawHexShard(ctx, cx, cy, size, color, alpha, rot) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i;
        ctx.lineTo(size * Math.sin(angle), size * Math.cos(angle));
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fill();
      ctx.restore();
    }

    function drawNoiseBlock(ctx, cx, cy, w, h, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.fillRect(cx - w/2, cy - h/2, w, h);
      ctx.restore();
    }

    function drawParticles() {
      if (!particleCtx) return;
      const w = particleCanvas.width / (window.devicePixelRatio || 1);
      const h = particleCanvas.height / (window.devicePixelRatio || 1);
      
      particleCtx.clearRect(0, 0, w, h);
      
      const centerX = w / 2;
      const centerY = h / 2;
      
      shockwaves.forEach(sw => {
        particleCtx.save();
        particleCtx.beginPath();
        particleCtx.arc(centerX, centerY, sw.radius, 0, Math.PI * 2);
        particleCtx.strokeStyle = sw.color;
        particleCtx.lineWidth = sw.lineWidth;
        particleCtx.globalAlpha = sw.alpha;
        particleCtx.stroke();
        
        particleCtx.beginPath();
        particleCtx.rect(centerX - sw.radius, centerY - sw.radius, sw.radius * 2, sw.radius * 2);
        particleCtx.strokeStyle = 'rgba(255,85,0,0.15)';
        particleCtx.lineWidth = 1.5;
        particleCtx.stroke();
        particleCtx.restore();
      });
      
      particles.forEach(p => {
        const px = centerX + p.x;
        const py = centerY + p.y;
        
        if (p.type === 'hex') {
          drawHexShard(particleCtx, px, py, p.size, p.color, p.alpha, p.rot);
        } else if (p.type === 'noise') {
          drawNoiseBlock(particleCtx, px, py, p.width, p.height, p.color, p.alpha);
        } else {
          particleCtx.save();
          particleCtx.beginPath();
          particleCtx.rect(px - p.size/2, py - p.size/2, p.size, p.size);
          particleCtx.fillStyle = p.color;
          particleCtx.strokeStyle = '#000000';
          particleCtx.lineWidth = 1;
          particleCtx.globalAlpha = p.alpha;
          particleCtx.fill();
          particleCtx.stroke();
          particleCtx.restore();
        }
      });
      
      if (flashOpacity > 0) {
        particleCtx.save();
        particleCtx.fillStyle = '#ffffff';
        particleCtx.globalAlpha = flashOpacity;
        particleCtx.fillRect(0, 0, w, h);
        particleCtx.restore();
      }
    }

    function animate() {
      drawAmbientBackground();
      updateParticles();
      drawParticles();
      
      if (!isPaused && tasks.length > 0 && currentTaskIndex < tasks.length) {
        const currentTask = tasks[currentTaskIndex];
        const remainingSeconds = Math.ceil(remainingMs / 1000);
        const angle = ((remainingMs / (totalDuration * 1000)) * Math.PI * 2) - Math.PI / 2;
        const radius = 85;
        
        const sparkX = Math.cos(angle) * radius;
        const sparkY = Math.sin(angle) * radius;
        
        const isLastSpurt = remainingSeconds <= 10;
        const spawnRate = isLastSpurt ? 0.8 : 0.25;
        
        if (Math.random() < spawnRate) {
          spawnSpark(sparkX, sparkY, currentTask.theme);
          if (isLastSpurt) {
            spawnSpark(sparkX, sparkY, currentTask.theme);
          }
        }
      }
      
      animationFrameId = requestAnimationFrame(animate);
    }

    // タイマー制御
    function startTimer() {
      if (tasks.length === 0) return;
      
      document.body.classList.add('internal-battery-mode');
      if (DOM.powerStatusText) {
        DOM.powerStatusText.textContent = isHiragana ? 'ないぶでんげん ドーサ中 (LIMIT)' : 'INTERNAL BATTERY ACTIVE';
      }
      if (DOM.powerStatusValue) {
        DOM.powerStatusValue.querySelector('.power-icon').textContent = '🔋';
      }
      
      const currentTask = tasks[currentTaskIndex];
      if (remainingMs === totalDuration * 1000 && isPaused) {
        triggerEvaAlert(isHiragana ? 'いくぞ！' : 'スタート！');
        spawnShockwave(0, 0, currentTask.theme);
      }
      
      isPaused = false;
      lastTimestamp = performance.now();
      
      if (DOM.playPauseBtn) {
        DOM.playPauseBtn.classList.add('active');
        DOM.playPauseBtn.querySelector('.btn-text').textContent = 'STOP';
      }
      
      if (timerId) cancelAnimationFrame(timerId);
      timerId = requestAnimationFrame(runTimerLoop);
    }

    function pauseTimer() {
      isPaused = true;
      if (timerId) {
        cancelAnimationFrame(timerId);
        timerId = null;
      }
      
      document.body.classList.remove('internal-battery-mode');
      if (DOM.powerStatusText) {
        DOM.powerStatusText.textContent = isHiragana ? 'がいぶでんげん セツゾク中' : 'EXTERNAL POWER CONNECTED';
      }
      if (DOM.powerStatusValue) {
        DOM.powerStatusValue.querySelector('.power-icon').textContent = '🔌';
      }
      
      if (DOM.playPauseBtn) {
        DOM.playPauseBtn.classList.remove('active');
        DOM.playPauseBtn.querySelector('.btn-text').textContent = 'START';
      }
      document.body.classList.remove('pulse-active');
    }

    function runTimerLoop(timestamp) {
      if (isPaused) return;
      
      // BEASTモード時は10倍速で進行
      const multiplier = isBeastMode ? 10 : 1;
      const delta = (timestamp - lastTimestamp) * multiplier;
      lastTimestamp = timestamp;
      
      remainingMs -= delta;
      
      if (remainingMs <= 0) {
        remainingMs = 0;
        updateTimerDisplay();
        handleTaskCompletion();
        return; 
      } else {
        const currSec = Math.ceil(remainingMs / 1000);
        const prevSec = Math.ceil((remainingMs + delta) / 1000);
        
        if (prevSec !== currSec) {
          if (countdownSoundEnabled && currSec <= 3) {
            playCountdownBeep(currSec === 0);
          }
          
          if (pulseEnabled && currSec <= 10) {
            document.body.classList.add('pulse-active');
          } else {
            document.body.classList.remove('pulse-active');
          }
        }
        
        updateTimerDisplay();
      }
      
      timerId = requestAnimationFrame(runTimerLoop);
    }

    function handleTaskCompletion() {
      pauseTimer();
      document.body.classList.remove('pulse-active');
      
      if (currentTaskIndex >= tasks.length) return;
      const completedTask = tasks[currentTaskIndex];
      
      spawnShockwave(0, 0, completedTask.theme);
      
      // BEASTモードなら完了時に即座に解除
      if (isBeastMode) {
        disableBeastMode();
      }
      
      const nextIndex = currentTaskIndex + 1;
      let alertText = '';
      if (nextIndex < tasks.length) {
        const nextTask = tasks[nextIndex];
        alertText = isHiragana ? nextTask.nameHiragana : nextTask.nameKanji;
      } else {
        alertText = loopEnabled ? (isHiragana ? 'もういっかい！' : '最初からループ！') : (isHiragana ? 'かつどうげんかい' : '活動限界');
      }
      triggerEvaAlert(alertText);
      
      if (DOM.chimeSelect) {
        playTransitionSound(DOM.chimeSelect.value);
      }
      
      setTimeout(() => {
        currentTaskIndex++;
        
        if (currentTaskIndex >= tasks.length) {
          if (loopEnabled) {
            currentTaskIndex = 0;
            loadTask(currentTaskIndex);
            startTimer();
          } else {
            currentTaskIndex = 0;
            loadTask(currentTaskIndex);
            alertUserAllDone();
          }
        } else {
          loadTask(currentTaskIndex);
          startTimer();
        }
      }, 1200);
    }

    function alertUserAllDone() {
      updateUI();
      triggerEvaAlert(isHiragana ? 'かつどうげんかい' : '活動限界');
      setTimeout(() => {
        if (DOM.chimeSelect) {
          playTransitionSound(DOM.chimeSelect.value);
        }
      }, 500);
    }

    // タスク読込
    function loadTask(index) {
      if (index < 0 || index >= tasks.length) return;
      currentTaskIndex = index;
      const task = tasks[index];
      totalDuration = task.duration;
      remainingMs = totalDuration * 1000;
      
      updateActiveThemeColors(task.theme);
      updateUI();
    }

    function updateActiveThemeColors(themeClass) {
      const root = document.documentElement;
      
      let activeColor = 'var(--eva-orange)';
      let activeGlow = 'var(--eva-orange-glow)';
      
      if (themeClass === 'theme-magenta') {
        activeColor = 'var(--eva-red)';
        activeGlow = 'var(--eva-red-glow)';
      } else if (themeClass === 'theme-yellow') {
        activeColor = 'var(--eva-yellow)';
        activeGlow = 'rgba(255, 210, 0, 0.35)';
      } else if (themeClass === 'theme-green') {
        activeColor = 'var(--eva-green)';
        activeGlow = 'rgba(0, 255, 102, 0.35)';
      }
      
      root.style.setProperty('--active-color', activeColor);
      root.style.setProperty('--active-glow', activeGlow);
    }

    function updateUI() {
      updateTimerDisplay();
      updateScheduleList();
      updateTimeline();
      
      if (tasks.length === 0) {
        if (DOM.currentTaskTitle) DOM.currentTaskTitle.textContent = isHiragana ? 'タイマーをいれよう！' : 'タイマーを追加しよう！';
        if (DOM.taskBadge) DOM.taskBadge.textContent = isHiragana ? 'じゅんび中' : '準備中';
        return;
      }
      
      if (currentTaskIndex >= tasks.length) return;
      const currentTask = tasks[currentTaskIndex];
      
      if (DOM.currentTaskTitle) {
        DOM.currentTaskTitle.textContent = isHiragana ? currentTask.nameHiragana : currentTask.nameKanji;
      }
      if (DOM.taskBadge) {
        DOM.taskBadge.textContent = isHiragana ? `じかん ${currentTaskIndex + 1}/${tasks.length}` : `時間 ${currentTaskIndex + 1}/${tasks.length}`;
      }
    }

    function updateTimerDisplay() {
      if (!DOM.clockHour || !DOM.clockMinute || !DOM.clockSecond) return;
      
      const minutes = Math.floor(remainingMs / 60000);
      const seconds = Math.floor((remainingMs % 60000) / 1000);
      const centiseconds = Math.floor((remainingMs % 1000) / 10);
      
      const minStr = String(minutes).padStart(2, '0');
      const secStr = String(seconds).padStart(2, '0');
      const centiStr = String(centiseconds).padStart(2, '0');
      
      DOM.clockHour.textContent = minStr;
      DOM.clockMinute.textContent = secStr;
      DOM.clockSecond.textContent = centiStr;
      
      // 時計/日付の表示更新
      const now = new Date();
      const timeStr = String(now.getHours()).padStart(2, '0') + "/" + String(now.getMinutes()).padStart(2, '0') + "/" + String(now.getSeconds()).padStart(2, '0');
      const dateText = document.getElementById('date');
      if (dateText) {
        dateText.textContent = timeStr;
      }
    }

    function updateScheduleList() {
      if (!DOM.scheduleList) return;
      DOM.scheduleList.innerHTML = '';
      
      tasks.forEach((task, idx) => {
        const item = document.createElement('div');
        item.className = 'schedule-item ' + task.theme + ' ' + (idx === currentTaskIndex ? 'current-item' : '');
        
        const minutes = Math.floor(task.duration / 60);
        const seconds = task.duration % 60;
        const timeString = minutes + '分' + (seconds > 0 ? seconds + '秒' : '');
        const timeStringHiragana = minutes + 'ふん' + (seconds > 0 ? seconds + 'びょう' : '');
        
        const taskName = isHiragana ? task.nameHiragana : task.nameKanji;
        const durationLabel = isHiragana ? timeStringHiragana : timeString;
        
        item.innerHTML = `
          <div class="schedule-item-info">
            <span class="item-index">${idx + 1}</span>
            <span class="item-name">${escapeHTML(taskName)}</span>
            <span class="item-duration">${durationLabel}</span>
          </div>
          <div class="schedule-item-actions">
            <button class="action-btn move-up-btn" data-index="${idx}" title="上へ移動" aria-label="上へ移動">▲</button>
            <button class="action-btn move-down-btn" data-index="${idx}" title="下へ移動" aria-label="下へ移動">▼</button>
            <button class="action-btn delete-btn" data-index="${idx}" title="削除する" aria-label="削除する">🗑️</button>
          </div>
        `;
        
        DOM.scheduleList.appendChild(item);
      });
    }

    function updateTimeline() {
      if (!DOM.timelineContainer) return;
      DOM.timelineContainer.innerHTML = '';
      
      if (tasks.length <= 1) {
        DOM.timelineContainer.style.display = 'none';
        return;
      }
      
      DOM.timelineContainer.style.display = 'flex';
      
      tasks.forEach((task, idx) => {
        const step = document.createElement('div');
        let status = 'future';
        if (idx < currentTaskIndex) {
          status = 'past';
        } else if (idx === currentTaskIndex) {
          status = 'active';
        }
        
        step.className = `timeline-step ${task.theme} ${status}`;
        const taskName = isHiragana ? task.nameHiragana : task.nameKanji;
        
        let indicatorHtml = '';
        if (status === 'past') {
          indicatorHtml = '<span class="step-indicator">✓</span>';
        } else if (status === 'active') {
          indicatorHtml = '<span class="step-indicator font-play">▶</span>';
        } else {
          indicatorHtml = `<span class="step-indicator">${idx + 1}</span>`;
        }
        
        step.innerHTML = `
          ${indicatorHtml}
          <span class="step-name">${escapeHTML(taskName)}</span>
        `;
        
        DOM.timelineContainer.appendChild(step);
        
        if (idx < tasks.length - 1) {
          const connector = document.createElement('div');
          connector.className = `timeline-connector ${idx < currentTaskIndex ? 'past' : 'future'}`;
          DOM.timelineContainer.appendChild(connector);
        }
      });
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    // BEAST (暴走) モード制御
    function toggleBeastMode() {
      isBeastMode = !isBeastMode;
      
      if (isBeastMode) {
        document.body.classList.add('beast-active');
        if (DOM.beastBtn) DOM.beastBtn.classList.add('active');
        triggerEvaAlert(isHiragana ? 'ビーストモード！' : 'THE BEAST');
        
        if (volume > 0 && !isMuted) {
          try {
            beastAudio = new Audio('./NERV-timer-main/NERV-timer-main/src/sounds/the-beast.mp3');
            beastAudio.loop = true;
            beastAudio.volume = volume;
            beastAudio.play().catch(e => console.log("Beast BGM play failed:", e));
          } catch(e) {
            console.error("Audio error:", e);
          }
        }
        
        if (isPaused) {
          startTimer();
        }
      } else {
        disableBeastMode();
        triggerEvaAlert(isHiragana ? 'ビースト解除' : 'BEAST CANCEL');
      }
    }

    function disableBeastMode() {
      isBeastMode = false;
      document.body.classList.remove('beast-active');
      if (DOM.beastBtn) DOM.beastBtn.classList.remove('active');
      if (beastAudio) {
        beastAudio.pause();
        beastAudio = null;
      }
    }

    function setupEventListeners() {
      if (DOM.playPauseBtn) {
        DOM.playPauseBtn.addEventListener('click', () => {
          if (isPaused) {
            startTimer();
          } else {
            pauseTimer();
          }
        });
      }
      
      if (DOM.resetBtn) {
        DOM.resetBtn.addEventListener('click', () => {
          pauseTimer();
          if (isBeastMode) disableBeastMode();
          loadTask(currentTaskIndex);
        });
      }
      
      if (DOM.skipBtn) {
        DOM.skipBtn.addEventListener('click', () => {
          pauseTimer();
          if (tasks.length === 0) return;
          
          const nextIndex = (currentTaskIndex + 1) % tasks.length;
          const nextTask = tasks[nextIndex];
          const alertText = isHiragana ? nextTask.nameHiragana : nextTask.nameKanji;
          
          spawnShockwave(0, 0, tasks[currentTaskIndex].theme);
          triggerEvaAlert(alertText);
          
          setTimeout(() => {
            currentTaskIndex = nextIndex;
            loadTask(currentTaskIndex);
          }, 200);
        });
      }

      if (DOM.beastBtn) {
        DOM.beastBtn.addEventListener('click', toggleBeastMode);
      }

      if (DOM.langToggleBtn) {
        DOM.langToggleBtn.addEventListener('click', () => {
          isHiragana = !isHiragana;
          localStorage.setItem('intervaltimer_hiragana', isHiragana);
          updateLanguageToggleUI();
          updateUI();
        });
      }
      
      if (DOM.volumeSlider) {
        DOM.volumeSlider.addEventListener('input', (e) => {
          volume = parseFloat(e.target.value);
          localStorage.setItem('intervaltimer_volume', volume);
          if (beastAudio) beastAudio.volume = volume;
          if (volume > 0) {
            isMuted = false;
            if (DOM.muteIcon) DOM.muteIcon.textContent = '🔊';
          } else {
            if (DOM.muteIcon) DOM.muteIcon.textContent = '🔇';
          }
        });
      }
      
      if (DOM.muteBtn) {
        DOM.muteBtn.addEventListener('click', () => {
          isMuted = !isMuted;
          if (isMuted) {
            if (DOM.muteIcon) DOM.muteIcon.textContent = '🔇';
            if (beastAudio) beastAudio.muted = true;
          } else {
            if (DOM.muteIcon) DOM.muteIcon.textContent = volume > 0 ? '🔊' : '🔇';
            if (beastAudio) beastAudio.muted = false;
            playTone(600, 0.05, 'sine', 0.2);
          }
        });
      }

      // NERVタイマーのフレーム部分のクリックでフルスクリーン切替
      const timerContainer = document.getElementById('timer-section');
      if (timerContainer) {
        timerContainer.addEventListener('click', (e) => {
          if (e.target.closest('#databoxes') || e.target.closest('.audio_control')) return;
          toggleFullscreen();
        });
      }
      
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        
        if (e.code === 'Space') {
          e.preventDefault();
          if (DOM.playPauseBtn) DOM.playPauseBtn.click();
        } else if (e.code === 'KeyR') {
          if (DOM.resetBtn) DOM.resetBtn.click();
        } else if (e.code === 'KeyN') {
          if (DOM.skipBtn) DOM.skipBtn.click();
        } else if (e.code === 'KeyB') {
          if (DOM.beastBtn) DOM.beastBtn.click();
        }
      });

      if (DOM.scheduleList) {
        DOM.scheduleList.addEventListener('click', (e) => {
          const index = parseInt(e.target.dataset.index);
          if (isNaN(index)) return;
          
          if (e.target.classList.contains('delete-btn')) {
            deleteTask(index);
          } else if (e.target.classList.contains('move-up-btn')) {
            moveTask(index, -1);
          } else if (e.target.classList.contains('move-down-btn')) {
            moveTask(index, 1);
          }
        });
      }

      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const presetKey = btn.dataset.preset;
          loadPreset(presetKey);
        });
      });

      document.querySelectorAll('.quick-time-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const min = parseInt(btn.dataset.time);
          if (DOM.newMin) DOM.newMin.value = min;
          if (DOM.newSec) DOM.newSec.value = 0;
        });
      });

      if (DOM.addTaskForm) {
        DOM.addTaskForm.addEventListener('submit', (e) => {
          e.preventDefault();
          
          const nameKanji = DOM.newKanji ? DOM.newKanji.value.trim() : '';
          const nameHiragana = DOM.newHiragana ? DOM.newHiragana.value.trim() : '';
          const min = DOM.newMin ? (parseInt(DOM.newMin.value) || 0) : 0;
          const sec = DOM.newSec ? (parseInt(DOM.newSec.value) || 0) : 0;
          
          const duration = min * 60 + sec;
          if (duration <= 0) {
            alert(isHiragana ? '時間は1秒以上にしてください！' : '時間は1秒以上に設定してください！');
            return;
          }
          
          const themeRadio = document.querySelector('input[name="task-theme"]:checked');
          const theme = themeRadio ? themeRadio.value : 'theme-cyan';
          
          const newTask = {
            id: 'task_' + Date.now(),
            nameKanji: nameKanji,
            nameHiragana: nameHiragana,
            duration: duration,
            theme: theme
          };
          
          tasks.push(newTask);
          saveTasks();
          
          if (DOM.newKanji) DOM.newKanji.value = '';
          if (DOM.newHiragana) DOM.newHiragana.value = '';
          if (DOM.newMin) DOM.newMin.value = 5;
          if (DOM.newSec) DOM.newSec.value = 0;
          
          if (tasks.length === 1) {
            loadTask(0);
          } else {
            updateUI();
          }
        });
      }

      if (DOM.loopSwitch) {
        DOM.loopSwitch.addEventListener('change', (e) => {
          loopEnabled = e.target.checked;
          localStorage.setItem('intervaltimer_loop', loopEnabled);
          updateUI();
        });
      }
      
      if (DOM.pulseSwitch) {
        DOM.pulseSwitch.addEventListener('change', (e) => {
          pulseEnabled = e.target.checked;
          localStorage.setItem('intervaltimer_pulse', pulseEnabled);
          if (!pulseEnabled) {
            document.body.classList.remove('pulse-active');
          }
        });
      }

      if (DOM.countdownSoundSwitch) {
        DOM.countdownSoundSwitch.addEventListener('change', (e) => {
          countdownSoundEnabled = e.target.checked;
          localStorage.setItem('intervaltimer_countdown_sound', countdownSoundEnabled);
        });
      }
      
      if (DOM.chimeSelect) {
        DOM.chimeSelect.addEventListener('change', (e) => {
          localStorage.setItem('intervaltimer_chime', e.target.value);
          playTransitionSound(e.target.value);
        });
      }
    }

    function saveTasks() {
      localStorage.setItem('intervaltimer_tasks', JSON.stringify(tasks));
    }

    function deleteTask(index) {
      if (index < 0 || index >= tasks.length) return;
      
      tasks.splice(index, 1);
      saveTasks();
      
      if (tasks.length === 0) {
        pauseTimer();
        if (isBeastMode) disableBeastMode();
        currentTaskIndex = 0;
        remainingMs = 0;
        totalDuration = 0;
      } else {
        if (currentTaskIndex >= tasks.length) {
          currentTaskIndex = tasks.length - 1;
        }
        
        if (index === currentTaskIndex) {
          loadTask(currentTaskIndex);
        } else if (index < currentTaskIndex) {
          currentTaskIndex--;
        }
      }
      
      updateUI();
    }

    function moveTask(index, direction) {
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= tasks.length) return;
      
      const temp = tasks[index];
      tasks[index] = tasks[targetIndex];
      tasks[targetIndex] = temp;
      
      saveTasks();
      
      if (currentTaskIndex === index) {
        currentTaskIndex = targetIndex;
      } else if (currentTaskIndex === targetIndex) {
        currentTaskIndex = index;
      }
      
      updateUI();
    }

    function loadPreset(key) {
      const presetData = PRESETS[key];
      if (!presetData) return;
      
      pauseTimer();
      if (isBeastMode) disableBeastMode();
      
      tasks = presetData.map((item, idx) => ({
        id: 'preset_' + key + '_' + idx + '_' + Date.now(),
        nameKanji: item.nameKanji,
        nameHiragana: item.nameHiragana,
        duration: item.minutes * 60 + item.seconds,
        theme: item.theme
      }));
      
      saveTasks();
      loadTask(0);
    }

    function updateLanguageToggleUI() {
      const allTranslatableElements = document.querySelectorAll('[data-kanji][data-hiragana]');
      
      allTranslatableElements.forEach(el => {
        const text = isHiragana ? el.dataset.hiragana : el.dataset.kanji;
        
        if (el.tagName === 'INPUT') {
          el.placeholder = text;
        } else {
          const btnTextEl = el.querySelector('.btn-text, .control-text');
          if (btnTextEl) {
            btnTextEl.textContent = text;
          } else {
            el.textContent = text;
          }
        }
      });

      if (DOM.langToggleText) {
        DOM.langToggleText.textContent = isHiragana ? '漢字（かんじ）にする' : 'ひらがな にする';
      }
      if (DOM.appTitle) {
        DOM.appTitle.textContent = isHiragana ? 'ドキドキ！どはでタイマー' : 'ドキドキ！どはでタイマー';
      }
      if (DOM.fsHintOverlay) {
        DOM.fsHintOverlay.textContent = isHiragana ? DOM.fsHintOverlay.dataset.hiragana : DOM.fsHintOverlay.dataset.kanji;
      }
    }

    function triggerEvaAlert(text) {
      const container = DOM.evaAlertPopup;
      const textEl = DOM.evaAlertText;
      if (!container || !textEl) return;
      
      textEl.textContent = text;
      
      container.classList.remove('active');
      void container.offsetWidth;
      container.classList.add('active');
      
      setTimeout(() => {
        container.classList.remove('active');
      }, 1500);
    }

    function showFullscreenHint() {
      const hint = DOM.fsHintOverlay;
      if (!hint) return;
      
      const isFS = document.body.classList.contains('fullscreen-mode');
      if (isFS) {
        hint.classList.add('show');
        setTimeout(() => {
          hint.classList.remove('show');
        }, 4000);
      } else {
        hint.classList.remove('show');
      }
    }

    function toggleFullscreen() {
      const isFS = document.body.classList.contains('fullscreen-mode');
      
      if (!isFS) {
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) {
          docEl.requestFullscreen();
        } else if (docEl.webkitRequestFullscreen) {
          docEl.webkitRequestFullscreen();
        } else if (docEl.msRequestFullscreen) {
          docEl.msRequestFullscreen();
        }
        document.body.classList.add('fullscreen-mode');
        showFullscreenHint();
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        document.body.classList.remove('fullscreen-mode');
        showFullscreenHint();
      }
      
      setTimeout(resizeCanvases, 150);
    }

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        document.body.classList.remove('fullscreen-mode');
        showFullscreenHint();
        resizeCanvases();
      } else {
        document.body.classList.add('fullscreen-mode');
        showFullscreenHint();
        resizeCanvases();
      }
    });

</script>

  <!-- エヴァ風システム警告ポップアップ -->
  <div id="eva-alert-popup" class="eva-alert-popup">
    <div class="explosion-flash"></div>
    <div class="emergency-hex-container">
      <div class="emergency-hex">
        <div class="hex-text-small">SYSTEM WARNING</div>
        <div class="hex-text-large" id="eva-alert-text">活動限界</div>
        <div class="hex-text-small">EMERGENCY</div>
      </div>
    </div>
  </div>

  <!-- 全画面時の操作ヒント -->
  <div id="fs-hint-overlay" class="fs-hint-overlay" data-kanji="スペースキー で スタート・一時停止 | [Esc]キー で もどる" data-hiragana="スペースキー で スタート・ストップ | [Esc]キー で もどる">
    スペースキー で スタート・一時停止 | [Esc]キー で もどる
  </div>
</body>
