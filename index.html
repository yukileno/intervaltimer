<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドキドキ！どはでインターバルタイマー</title>
  <meta name="description" content="小学校の授業や家庭学習で使える、ド派手な演出と音で楽しむワクワク・ドキドキのインターバルタイマーです。">
  <!-- Google Fonts: Orbitron (数字用), M PLUS Rounded 1c (子供向け日本語用), Outfit (UI用) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Orbitron:wght@600;900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================================================
       ドキドキ！どはでタイマー - デザインシステム & スタイリング (インライン)
       ========================================================================== */

    :root {
      --bg-color: #050814;
      --bg-gradient: radial-gradient(circle at center, #0c122c 0%, #050814 100%);
      --card-bg: rgba(13, 20, 44, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #8f9cae;
      --text-muted: #5e6b7c;
      
      /* ネオンカラー */
      --neon-cyan: #00f2fe;
      --neon-cyan-glow: rgba(0, 242, 254, 0.35);
      --neon-magenta: #ff2a85;
      --neon-magenta-glow: rgba(255, 42, 133, 0.35);
      --neon-yellow: #ffd200;
      --neon-yellow-glow: rgba(255, 210, 0, 0.35);
      --neon-green: #00e676;
      --neon-green-glow: rgba(0, 230, 118, 0.35);
      
      --active-color: var(--neon-cyan);
      --active-glow: var(--neon-cyan-glow);
      
      --font-timer: 'Orbitron', monospace;
      --font-ui: 'Outfit', 'M PLUS Rounded 1c', sans-serif;
      
      --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      --border-radius-lg: 24px;
      --border-radius-md: 16px;
      --border-radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* フルスクリーン時のブラウザ初期背景をダークに上書き (白くなる問題の解決) */
    :fullscreen,
    :fullscreen * {
      background-color: #050814 !important;
    }

    ::backdrop {
      background-color: #050814 !important;
    }

    /* Webkit (Safari/Chrome/Edge) フルスクリーン対応 */
    :-webkit-full-screen {
      background-color: #050814 !important;
    }
    
    :-webkit-full-screen * {
      background-color: #050814 !important;
    }

    html, body {
      background: var(--bg-color) !important;
      background-image: var(--bg-gradient) !important;
      font-family: var(--font-ui);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 背景アニメーション */
    .ambient-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.4;
    }

    /* 残り10秒以下の鼓動（パルス） */
    @keyframes body-heartbeat {
      0% {
        box-shadow: inset 0 0 50px rgba(255, 0, 0, 0);
        background-color: rgba(255, 0, 0, 0);
      }
      50% {
        box-shadow: inset 0 0 100px rgba(255, 42, 133, 0.4);
        background-color: rgba(255, 42, 133, 0.08);
      }
      100% {
        box-shadow: inset 0 0 50px rgba(255, 0, 0, 0);
        background-color: rgba(255, 0, 0, 0);
      }
    }

    body.pulse-active {
      animation: body-heartbeat 1.0s infinite ease-in-out;
    }

    .app-container {
      width: 100%;
      max-width: 1600px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 40px;
      position: relative;
      z-index: 1;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 2rem;
      filter: drop-shadow(0 0 10px var(--neon-yellow));
      animation: pulse-icon 2s infinite alternate;
    }

    @keyframes pulse-icon {
      0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--neon-yellow)); }
      100% { transform: scale(1.15); filter: drop-shadow(0 0 15px var(--neon-yellow)); }
    }

    .logo-text {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(45deg, #00f2fe, #ff2a85, #ffd200);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* 音量調整 */
    .volume-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 12px;
      border-radius: 30px;
      border: 1px solid var(--card-border);
    }

    .volume-control input[type="range"] {
      width: 80px;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .volume-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-primary);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      transition: transform 0.1s;
    }

    .volume-control input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    .app-main {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      gap: 48px;
      align-items: start;
    }

    /* タイマー画面 */
    .timer-section {
      background: rgba(8, 14, 38, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--border-radius-lg);
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: var(--transition-smooth);
    }

    .current-task-display {
      text-align: center;
      margin-bottom: 24px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--active-color);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
      transition: var(--transition-smooth);
    }

    .task-title {
      font-size: 2.2rem;
      font-weight: 900;
      margin-top: 12px;
      letter-spacing: -0.5px;
      transition: var(--transition-smooth);
      color: var(--text-primary);
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    /* 巨大タイマー */
    .timer-visual-container {
      position: relative;
      width: 380px;
      height: 380px;
      margin: 24px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .particle-canvas {
      position: absolute;
      top: -60px;
      left: -60px;
      width: 500px;
      height: 500px;
      z-index: 1;
      pointer-events: none;
    }

    .progress-ring-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.04);
      stroke-width: 12px;
    }

    .progress-ring-active {
      fill: none;
      stroke: url(#ring-gradient-ok);
      stroke-width: 12px;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
      filter: drop-shadow(0 0 12px var(--active-glow));
    }

    .countdown-value-wrapper {
      position: relative;
      z-index: 3;
      text-align: center;
      pointer-events: none;
    }

    .countdown-time {
      font-family: var(--font-timer);
      font-size: 5.6rem;
      font-weight: 900;
      color: var(--text-primary);
      text-shadow: 0 0 20px var(--active-glow), 0 0 40px rgba(0,0,0,0.5);
      letter-spacing: -2px;
      line-height: 1;
    }

    @keyframes timer-shaking {
      0% { transform: scale(1.0) rotate(0deg); }
      25% { transform: scale(1.03) rotate(-1deg); }
      50% { transform: scale(1.0) rotate(0deg); }
      75% { transform: scale(1.03) rotate(1deg); }
      100% { transform: scale(1.0) rotate(0deg); }
    }

    body.pulse-active .timer-visual-container {
      animation: timer-shaking 0.5s infinite linear;
    }

    /* 次のタスク予告 */
    .next-task-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.03);
      padding: 10px 24px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 32px;
      max-width: 90%;
    }

    .preview-label {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: bold;
    }

    .preview-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 8px rgba(0, 242, 254, 0.2);
    }

    /* 操作ボタン */
    .timer-controls {
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 4;
    }

    .control-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      outline: none;
      transition: var(--transition-smooth);
    }

    .control-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: var(--transition-smooth);
    }

    .control-text {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .primary-control .control-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--active-color) 0%, #ffffff 200%);
      font-size: 2rem;
      box-shadow: 0 10px 30px var(--active-glow);
      color: #050814;
    }

    .primary-control:hover .control-icon {
      transform: scale(1.1);
      box-shadow: 0 15px 40px var(--active-glow), 0 0 20px var(--active-color);
    }

    .primary-control:active .control-icon {
      transform: scale(0.95);
    }

    .secondary-control .control-icon {
      width: 52px;
      height: 52px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      font-size: 1.3rem;
    }

    .secondary-control:hover .control-icon {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      color: var(--text-primary);
    }

    .secondary-control:active .control-icon {
      transform: translateY(1px);
    }

    .secondary-control:hover .control-text {
      color: var(--text-primary);
    }

    /* 一般ボタン */
    .ui-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition-smooth);
    }

    .ui-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .ui-btn:active {
      transform: translateY(1px);
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--neon-cyan) 0%, #00b0ff 100%);
      color: #050814;
      border: none;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.25);
    }

    .primary-btn:hover {
      background: linear-gradient(135deg, #00f2fe 0%, #00e5ff 100%);
      box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4), 0 0 10px var(--neon-cyan);
    }

    .icon-btn {
      padding: 10px;
      border-radius: 50%;
    }

    .text-icon-btn {
      margin-top: 32px;
      font-size: 0.85rem;
      padding: 8px 16px;
      border-radius: 20px;
      background: transparent;
      border-color: rgba(255,255,255,0.06);
      color: var(--text-secondary);
    }

    .text-icon-btn:hover {
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.03);
    }

    /* 設定エリア */
    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .settings-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--border-radius-lg);
      padding: 28px;
      backdrop-filter: blur(15px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 20px;
      border-left: 4px solid var(--neon-cyan);
      padding-left: 12px;
      line-height: 1;
    }

    /* プリセット */
    .preset-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .preset-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--border-radius-md);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      text-align: left;
      transition: var(--transition-smooth);
    }

    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .preset-icon {
      font-size: 1.8rem;
      background: rgba(255, 255, 255, 0.05);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
    }

    .preset-info {
      display: flex;
      flex-direction: column;
    }

    .preset-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .preset-duration {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* タスクスケジュールリスト */
    .schedule-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .schedule-list::-webkit-scrollbar {
      width: 6px;
    }

    .schedule-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .schedule-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .schedule-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .schedule-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--border-radius-md);
      padding: 12px 16px;
      transition: var(--transition-smooth);
    }

    .schedule-item.current-item {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--active-color);
      box-shadow: inset 3px 0 0 var(--active-color), 0 0 15px rgba(255, 255, 255, 0.05);
    }

    .schedule-item.theme-cyan { border-left: 4px solid var(--neon-cyan); }
    .schedule-item.theme-magenta { border-left: 4px solid var(--neon-magenta); }
    .schedule-item.theme-yellow { border-left: 4px solid var(--neon-yellow); }
    .schedule-item.theme-green { border-left: 4px solid var(--neon-green); }

    .schedule-item-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .item-index {
      font-family: var(--font-timer);
      font-size: 0.85rem;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.04);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .item-name {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .item-duration {
      font-family: var(--font-timer);
      font-size: 0.9rem;
      color: var(--text-secondary);
      background: rgba(0,0,0,0.2);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .schedule-item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1rem;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: var(--transition-smooth);
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
    }

    .delete-btn:hover {
      background: rgba(255, 42, 133, 0.15);
      color: var(--neon-magenta);
    }

    /* タスク追加フォーム */
    .add-task-form {
      border-top: 1px dashed rgba(255, 255, 255, 0.1);
      padding-top: 24px;
    }

    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .form-group.size-half {
      flex: 0.5;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-group input {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 0.95rem;
      padding: 10px 14px;
      border-radius: var(--border-radius-sm);
      outline: none;
      transition: var(--transition-smooth);
    }

    .form-group input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
    }

    .quick-time-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .quick-time-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .quick-time-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text-primary);
    }

    .theme-picker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      background: rgba(0, 0, 0, 0.15);
      padding: 10px 16px;
      border-radius: var(--border-radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .picker-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .theme-options {
      display: flex;
      gap: 12px;
    }

    .theme-radio {
      cursor: pointer;
      display: inline-block;
      position: relative;
      width: 24px;
      height: 24px;
    }

    .theme-radio input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .radio-dot {
      position: absolute;
      top: 0;
      left: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: var(--transition-smooth);
    }

    .theme-radio.cyan .radio-dot { background-color: var(--neon-cyan); }
    .theme-radio.magenta .radio-dot { background-color: var(--neon-magenta); }
    .theme-radio.yellow .radio-dot { background-color: var(--neon-yellow); }
    .theme-radio.green .radio-dot { background-color: var(--neon-green); }

    .theme-radio input:checked + .radio-dot {
      border-color: var(--text-primary);
      transform: scale(1.15);
      box-shadow: 0 0 10px var(--text-primary);
    }

    .add-btn {
      width: 100%;
      justify-content: center;
    }

    /* オプション設定 */
    .option-items {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .option-switch {
      display: flex;
      align-items: center;
      position: relative;
      cursor: pointer;
    }

    .option-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch-slider {
      position: relative;
      width: 44px;
      height: 24px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      transition: .4s;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .switch-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: var(--text-primary);
      border-radius: 50%;
      transition: .4s;
    }

    .option-switch input:checked + .switch-slider {
      background-color: var(--neon-cyan);
    }

    .option-switch input:checked + .switch-slider:before {
      transform: translateX(20px);
    }

    .switch-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .sound-select-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      border-top: 1px dashed rgba(255, 255, 255, 0.06);
      padding-top: 16px;
    }

    .sound-select-group label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .sound-select-group select {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: var(--border-radius-sm);
      outline: none;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      cursor: pointer;
    }

    .sound-select-group select:focus {
      border-color: var(--neon-cyan);
    }

    /* --------------------------------------------------------------------------
       進行タイムライン
       -------------------------------------------------------------------------- */
    .timeline-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin: 16px 0 24px 0;
      width: 100%;
      max-width: 90%;
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 20px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      transition: var(--transition-smooth);
    }
    
    .timeline-step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      transition: var(--transition-smooth);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }
    
    .timeline-step.past {
      opacity: 0.5;
      background: rgba(255, 255, 255, 0.01);
      text-decoration: line-through;
    }
    
    .timeline-step.active {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--active-color);
      color: var(--text-primary);
      box-shadow: 0 0 15px var(--active-glow);
      transform: scale(1.05);
    }
    
    .timeline-step.future {
      opacity: 0.75;
    }
    
    .step-indicator {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-family: var(--font-timer);
      transition: var(--transition-smooth);
    }
    
    .timeline-step.active .step-indicator {
      background: var(--active-color);
      color: #050814;
      font-weight: 900;
      box-shadow: 0 0 8px var(--active-color);
    }
    
    .timeline-step.active .step-indicator.font-play {
      font-size: 0.65rem;
      text-indent: 1px;
    }
    
    .timeline-step.past .step-indicator {
      background: rgba(255, 255, 255, 0.25);
      color: var(--text-primary);
    }
    
    .timeline-connector {
      height: 2px;
      width: 24px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 1px;
    }
    
    .timeline-connector.past {
      background: var(--active-color);
      opacity: 0.4;
    }

    /* --------------------------------------------------------------------------
       全画面モード (横長モニター最適化：左右分割コクピットレイアウト)
       -------------------------------------------------------------------------- */
    body.fullscreen-mode {
      background: #030611 !important;
      background-image: radial-gradient(circle at center, #080f2d 0%, #030611 100%) !important;
      padding: 0;
      overflow: hidden; /* スクロールバーが出ないように固定 */
    }

    /* ヘッダー、設定セクション、コントロールボタンを非表示に */
    body.fullscreen-mode .app-header,
    body.fullscreen-mode .settings-section,
    body.fullscreen-mode .timer-controls,
    body.fullscreen-mode #fullscreen-btn {
      display: none !important;
    }

    body.fullscreen-mode .app-container {
      padding: 0;
      max-width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent !important;
    }

    body.fullscreen-mode .app-main {
      grid-template-columns: 1fr;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent !important;
    }

    body.fullscreen-mode .timer-section {
      border: none;
      background: transparent !important;
      box-shadow: none;
      backdrop-filter: none;
      height: 100vh;
      width: 100%;
      display: grid;
      grid-template-columns: 1.15fr 1fr; /* 左右に分割：左はテキスト情報、右は巨大タイマー */
      align-items: center;
      justify-items: center;
      padding: 6vh 8vw; /* 左右に少し余白を持たせる */
      gap: 6vw;
    }

    /* 左側のテキスト情報エリア */
    body.fullscreen-mode .current-task-display {
      margin-bottom: 0;
      text-align: left; /* 左寄せ */
      display: flex;
      flex-direction: column;
      align-items: flex-start; /* 左寄せ */
      width: 100%;
    }

    body.fullscreen-mode .badge {
      font-size: 1.8rem;
      padding: 10px 32px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--active-color);
      box-shadow: 0 0 20px var(--active-glow);
    }

    body.fullscreen-mode .task-title {
      font-size: clamp(3.2rem, 7.5vh, 6.2rem); /* 縦幅基準の極大フォント */
      margin-top: 32px;
      line-height: 1.2;
      text-align: left;
      width: 100%;
      word-break: break-all;
      text-shadow: 0 0 30px var(--active-glow), 0 0 60px rgba(255, 255, 255, 0.15);
    }

    /* 全画面時のタイムライン */
    body.fullscreen-mode .timeline-container {
      margin: 40px 0 0 0;
      justify-content: flex-start;
      max-width: 100%;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(255, 255, 255, 0.06);
    }
    
    body.fullscreen-mode .timeline-step {
      font-size: 1.1rem;
      padding: 8px 18px;
    }
    
    body.fullscreen-mode .step-indicator {
      width: 24px;
      height: 24px;
      font-size: 0.95rem;
    }

    /* 右側の巨大タイマーコンテナ */
    body.fullscreen-mode .timer-visual-container {
      width: 74vh; /* 縦幅の74%まで巨大化 (横に並べるためタイトルと絶対に被らない) */
      height: 74vh;
      max-width: 680px;
      max-height: 680px;
      margin: 0;
    }

    body.fullscreen-mode .particle-canvas {
      width: 96vh;
      height: 96vh;
      max-width: 880px;
      max-height: 880px;
      top: -11vh;
      left: -11vh;
    }

    body.fullscreen-mode .countdown-time {
      font-size: clamp(6.5rem, 15vh, 13rem); /* カウントダウン数値を極大化 */
      text-shadow: 0 0 45px var(--active-glow), 0 0 90px rgba(0,0,0,0.6);
    }

    /* 全画面時は次の時間予告を非表示に（タイムラインで対応） */
    body.fullscreen-mode .next-task-preview {
      display: none !important;
    }

    /* 操作ヒントオーバーレイ */
    .fs-hint-overlay {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.35);
      background: rgba(8, 12, 32, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 24px;
      border-radius: 30px;
      pointer-events: none;
      transition: opacity 0.8s ease;
      opacity: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .fs-hint-overlay.show {
      opacity: 1;
    }

    /* --------------------------------------------------------------------------
       アメコミ風カートゥーン爆発ポップアップ
       -------------------------------------------------------------------------- */
    .cartoon-explosion {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 440px;
      height: 440px;
      z-index: 9999;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
    }

    .cartoon-explosion.active {
      animation: pop-cartoon 1.3s cubic-bezier(0.175, 0.885, 0.32, 1.35) forwards;
    }

    @keyframes pop-cartoon {
      0% {
        transform: translate(-50%, -50%) scale(0) rotate(-15deg);
        opacity: 0;
      }
      12% {
        transform: translate(-50%, -50%) scale(1.15) rotate(5deg);
        opacity: 1;
      }
      18% {
        transform: translate(-50%, -50%) scale(1.0) rotate(0deg);
        opacity: 1;
      }
      82% {
        transform: translate(-50%, -50%) scale(1.0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(0.6) rotate(15deg);
        opacity: 0;
      }
    }

    .explosion-svg {
      position: absolute;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 15px 0 rgba(0,0,0,0.35));
    }

    .spike-bg {
      fill: #ff2a85;
      stroke: #050814;
      stroke-width: 12px;
      stroke-linejoin: round;
      animation: spin-bg 25s linear infinite;
      transform-origin: 200px 200px;
    }

    .spike-fg {
      fill: #ffd200;
      stroke: #050814;
      stroke-width: 10px;
      stroke-linejoin: round;
      animation: spin-fg 18s linear infinite reverse;
      transform-origin: 200px 200px;
    }

    @keyframes spin-bg {
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-fg {
      100% { transform: rotate(360deg); }
    }

    .explosion-text {
      position: relative;
      font-family: 'M PLUS Rounded 1c', var(--font-ui);
      font-weight: 900;
      font-size: 3.8rem;
      font-size: clamp(2.2rem, 8vw, 4.2rem);
      color: #ffffff;
      text-align: center;
      z-index: 10;
      text-shadow: 
        -4px -4px 0 #050814,  
         4px -4px 0 #050814,
        -4px  4px 0 #050814,
         4px  4px 0 #050814,
        -8px  8px 0 #050814,
         0px  8px 0 #050814,
         8px  8px 0 #050814;
      letter-spacing: -1px;
      animation: text-pulse 0.35s ease-in-out infinite alternate;
      white-space: nowrap;
    }

    @keyframes text-pulse {
      0% { transform: scale(0.95) rotate(-3deg); }
      100% { transform: scale(1.05) rotate(3deg); }
    }

    .explosion-flash {
      position: fixed;
      top: -100vh;
      left: -100vw;
      width: 300vw;
      height: 300vh;
      background: #ffffff;
      opacity: 0;
      z-index: 9998;
      pointer-events: none;
    }

    .cartoon-explosion.active .explosion-flash {
      animation: flash-screen 0.22s ease-out forwards;
    }

    @keyframes flash-screen {
      0% { opacity: 0.85; }
      100% { opacity: 0; }
    }

    /* メディアクエリ */
    @media (max-width: 992px) {
      .app-main {
        grid-template-columns: 1fr;
      }
      
      .timer-section {
        padding: 30px;
      }
    }

    @media (max-width: 576px) {
      .app-container {
        padding: 12px;
      }
      
      .app-header {
        flex-direction: column;
        gap: 16px;
        align-items: stretch;
      }
      
      .header-controls {
        justify-content: space-between;
      }
      
      .preset-buttons {
        grid-template-columns: 1fr;
      }
      
      .timer-visual-container {
        width: 260px;
        height: 260px;
      }
      
      .particle-canvas {
        width: 340px;
        height: 340px;
        top: -40px;
        left: -40px;
      }
      
      .countdown-time {
        font-size: 3.8rem;
      }
      
      .task-title {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body class="theme-dark">

  <div class="app-container">
    <!-- 背景用のアニメーションキャンバス -->
    <canvas id="ambient-canvas" class="ambient-canvas"></canvas>

    <header class="app-header">

        <span class="logo-icon">⚡</span>
        <h1 class="logo-text" id="app-title" data-kanji="ドキドキ！どはでタイマー" data-hiragana="ドキドキ！どはでタイマー">ドキドキ！どはでタイマー</h1>
      </div>
      <div class="header-controls">

        </div>
      </div>
    </header>

    <main class="app-main">
      <!-- タイマー表示セクション -->
      <section class="timer-section" id="timer-section">
        <!-- 進行中のタスク表示 -->
        <div class="current-task-display">
          <span class="badge" id="task-badge" data-kanji="じゅんび中" data-hiragana="じゅんびちゅう">じゅんび中</span>
          <h2 class="task-title" id="current-task-title" data-kanji="タイマーをスタートしよう！" data-hiragana="タイマーをスタートしよう！">タイマーをスタートしよう！</h2>

          <!-- SVG プログレスリング -->
          <svg class="progress-ring-svg" viewBox="0 0 200 200">
            <defs>
              <!-- グラデーションの定義 -->
              <linearGradient id="ring-gradient-ok" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f2fe" />
                <stop offset="100%" stop-color="#4facfe" />

              <linearGradient id="ring-gradient-warning" x1="0%" y1="0%" x2="100%" y2="100%">

                <stop offset="100%" stop-color="#ff5858" />
              </linearGradient>
              <!-- 影効果のフィルター -->
              <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="6" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>

            <!-- 背景サークル -->
            <circle class="progress-ring-bg" cx="100" cy="100" r="85"></circle>
            <!-- 進行度サークル -->

          </svg>

          <!-- カウントダウン数字 -->

        <!-- 全画面表示切り替え -->

    // 2. アプリケーション状態変数

    // 初期化
    window.addEventListener('DOMContentLoaded', () => {

    function setupCanvas() {
      particleCanvas = document.getElementById('particle-canvas');
      particleCtx = particleCanvas ? particleCanvas.getContext('2d') : null;
      
      ambientCanvas = document.getElementById('ambient-canvas');
      ambientCtx = ambientCanvas ? ambientCanvas.getContext('2d') : null;

    function resizeCanvases() {
      if (!particleCanvas || !ambientCanvas) return;
      
      const container = document.querySelector('.timer-visual-container');
      if (!container) return;
      
      const rect = container.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      
      particleCanvas.width = rect.width * 1.3 * scale;
      particleCanvas.height = rect.height * 1.3 * scale;
      if (particleCtx) particleCtx.scale(scale, scale);
      
      ambientCanvas.width = window.innerWidth * scale;
      ambientCanvas.height = window.innerHeight * scale;
      if (ambientCtx) ambientCtx.scale(scale, scale);
    }

    function loadSettingsAndTasks() {
      const savedTasks = localStorage.getItem('intervaltimer_tasks');
      if (savedTasks) {
        try {
          tasks = JSON.parse(savedTasks);
          if (!Array.isArray(tasks) || tasks.length === 0) {
            tasks = [...DEFAULT_TASKS];
          }
        } catch (e) {
          tasks = [...DEFAULT_TASKS];
        }
      } else {
        tasks = [...DEFAULT_TASKS];
      }
      
      loopEnabled = localStorage.getItem('intervaltimer_loop') !== 'false';
      if (DOM.loopSwitch) DOM.loopSwitch.checked = loopEnabled;
      
      pulseEnabled = localStorage.getItem('intervaltimer_pulse') !== 'false';
      if (DOM.pulseSwitch) DOM.pulseSwitch.checked = pulseEnabled;

      countdownSoundEnabled = localStorage.getItem('intervaltimer_countdown_sound') !== 'false';
      if (DOM.countdownSoundSwitch) DOM.countdownSoundSwitch.checked = countdownSoundEnabled;

      const savedChime = localStorage.getItem('intervaltimer_chime');
      if (savedChime && DOM.chimeSelect) {
        DOM.chimeSelect.value = savedChime;
      }
      
      isHiragana = localStorage.getItem('intervaltimer_hiragana') === 'true';
      updateLanguageToggleUI();

      const savedVol = localStorage.getItem('intervaltimer_volume');
      if (savedVol !== null) {
        volume = parseFloat(savedVol);
        if (DOM.volumeSlider) DOM.volumeSlider.value = volume;
      }
      
      currentTaskIndex = 0;
      if (tasks.length > 0) {
        loadTask(0);
      }
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        debugLog("🔊 AudioContext を初期化しました");
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // --------------------------------------------------------------------------
    // 豊かなドラム/シンバル（ノイズ）や和音シンセ波形を作るための音響合成ロジック
    // --------------------------------------------------------------------------
    
    // アタックのシンバルクラッシュ音（高域ノイズの高速減衰）
    function playCymbalCrash(duration = 1.0, volumeVal = 0.22) {
      if (isMuted || volume === 0) return;
      try {
        initAudio();
        
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        
        // ホワイトノイズ生成
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        
        const noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;
        
        // ハイパスフィルターで「シャーン」という金属感のみ抽出
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 1800; // 低周波をカットして高音を強調
        
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(volumeVal * volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        noiseNode.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        noiseNode.start();
        noiseNode.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.error("シンバル再生エラー:", e);
      }
    }

    // ドラムのキック/ベースアタック音（サイン波の瞬間スイープ）
    function playDrumKick(duration = 0.18, volumeVal = 0.5) {
      if (isMuted || volume === 0) return;
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.type = 'sine';
        // 120Hzから40Hzへ瞬時にピッチスライドして「ドムッ」という重低音を作る
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(35, audioCtx.currentTime + duration);
        
        gainNode.gain.setValueAtTime(volumeVal * volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.error("ドラムキックエラー:", e);
      }
    }

    // 汎用シンセ音量・周波数制御再生
    function playTone(freq, duration, type = 'sine', gainVal = 0.5, slideTo = null) {
      if (isMuted || volume === 0) return;
      try {
        initAudio();
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        if (slideTo) {
          osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
        }
        
        gainNode.gain.setValueAtTime(gainVal * volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.error("音声エラー:", e);
      }
    }

    function playCountdownBeep(high = false) {
      const freq = high ? 1200 : 800;
      const dur = high ? 0.3 : 0.15;
      playTone(freq, dur, 'sine', 0.6);
    }

    // 豪華な効果音（リニューアル）
    function playTransitionSound(type) {
      debugLog("🎵 効果音再生: " + type);
      switch (type) {
        case 'fanfare-heroic':
          playHeroicFanfare();
          break;
        case 'retro-game':
          playRetroGameSound();
          break;
        case 'school-bell':

          break;
        case 'magic-sparkle':

          break;
        default:

      }
    }

    // 🦸 豪華スーパーヒーローファンファーレ (シンバル＋デチューンシンセブラスコード)
    function playHeroicFanfare() {
      initAudio();
      
      // 1. アタックの豪華シンバルクラッシュ
      playCymbalCrash(1.6, 0.28);
      // ドラムキックアタック
      playDrumKick(0.2, 0.4);
      
      // 2. ブラスコード進行: C -> F -> G -> C(高)
      const progress = [
        { time: 0.0, notes: [261.63, 329.63, 392.00] }, // C4, E4, G4
        { time: 0.3, notes: [349.23, 440.00, 523.25] }, // F4, A4, C5
        { time: 0.6, notes: [392.00, 493.88, 587.33] }, // G4, B4, D5
        { time: 0.9, notes: [523.25, 659.25, 783.99, 1046.50] } // C5, E5, G5, C6 (最後は超太く)
      ];
      
      progress.forEach(step => {
        step.notes.forEach(freq => {
          setTimeout(() => {
            const isLast = step.time === 0.9;
            const dur = isLast ? 1.6 : 0.35;
            const vol = isLast ? 0.18 : 0.15;
            
            // 鋸歯状波(Sawtooth)を少しずらして重ね、分厚い「スーパーソウ」を作る
            playTone(freq, dur, 'sawtooth', vol);
            playTone(freq + 4, dur, 'sawtooth', vol); // デチューン+
            playTone(freq - 4, dur, 'sawtooth', vol); // デチューン-
            
            // 低域のサイン波を足して低音の安定感を出す
            playTone(freq / 2, dur, 'sine', 0.25);
          }, step.time * 1000);
        });
      });
    }

    // 🎮 ウルトラレトロゲーム音 (ドラムビート＋超高速アルペジオ)
    function playRetroGameSound() {
      initAudio();
      
      // 太いドラムキック
      playDrumKick(0.25, 0.6);
      
      // 10音のアルペジオを駆け上がり、ハーモニーを重ねる
      const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00];
      
      notes.forEach((freq, idx) => {
        setTimeout(() => {
          // 矩形波(Square) 2基による8bitピコピコメロディ
          playTone(freq, 0.08, 'square', 0.22);
          playTone(freq * 1.5, 0.06, 'square', 0.08); // 5度上のハモリ
        }, idx * 45);
      });
    }

    // 🔔 スーパー学校のチャイム (物理鐘の共振倍音を完全再現した澄んだ音)
    function playSchoolBellSound() {
      initAudio();
      
      const notes = [349.23, 440.00, 392.00, 261.63]; // F4 - A4 - G4 - C4
      
      notes.forEach((freq, idx) => {
        setTimeout(() => {
          // 物理的な鐘の共振構造（1オクターブ上、非整数倍音）を重ねてリアルに
          const partials = [
            { f: freq, g: 0.38, d: 2.2 },        // 基音 (長めの減衰)
            { f: freq * 2, g: 0.18, d: 1.6 },    // 2倍音
            { f: freq * 3, g: 0.12, d: 1.2 },    // 3倍音
            { f: freq * 4.25, g: 0.08, d: 0.8 }  // 不協和な金属振動音
          ];
          
          partials.forEach(p => {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(p.f, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(p.g * volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + p.d);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + p.d);
          });
        }, idx * 950); // 余裕あるテンポ感
      });
    }

    // ✨ まほうのきらきらグリッサンド (上昇下降ウェーブ)
    function playMagicSparkleSound() {
      initAudio();
      
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00, 2637.02, 3135.96, 4186.01];
      
      // 1. 上昇ウェーブ (三角波)
      notes.forEach((freq, idx) => {
        setTimeout(() => {
          playTone(freq, 0.22, 'triangle', 0.15);
          playTone(freq * 1.02, 0.18, 'sine', 0.1);
        }, idx * 35);
      });
      
      // 2. 折り返しの下降ウェーブ (高域サイン波のきらめき)
      const revNotes = [...notes].reverse();
      setTimeout(() => {
        revNotes.forEach((freq, idx) => {
          setTimeout(() => {
            playTone(freq * 1.5, 0.28, 'sine', 0.22);
          }, idx * 28);
        });
      }, 350);
    }

    function createAmbientOrb() {
      return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 350 + 200, // 劇的に大きくして大画面に美しく広げる
        vx: (Math.random() - 0.5) * 0.2, // ゆっくりと優雅に動かす
        vy: (Math.random() - 0.5) * 0.2,
        hue: Math.random() * 360,
        opacity: Math.random() * 0.10 + 0.03 // 大画面で眩しくなりすぎないよう透過度を調整
      };
    }

    function updateAmbientOrbs() {
      ambientOrbs.forEach(orb => {
        orb.x += orb.vx;
        orb.y += orb.vy;
        
        if (orb.x < -orb.size) orb.x = window.innerWidth + orb.size;
        if (orb.x > window.innerWidth + orb.size) orb.x = -orb.size;
        if (orb.y < -orb.size) orb.y = window.innerHeight + orb.size;
        if (orb.y > window.innerHeight + orb.size) orb.y = -orb.size;
      });
    }

    function drawAmbientOrbs() {
      if (!ambientCtx) return;
      ambientCtx.clearRect(0, 0, ambientCanvas.width / (window.devicePixelRatio || 1), ambientCanvas.height / (window.devicePixelRatio || 1));
      
      ambientCtx.save();
      ambientCtx.globalCompositeOperation = 'screen'; // スクリーンブレンドでネオンカラーを鮮やかに
      
      ambientOrbs.forEach(orb => {
        const grad = ambientCtx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.size);
        grad.addColorStop(0, 'hsla(' + orb.hue + ', 80%, 60%, ' + orb.opacity + ')');
        grad.addColorStop(1, 'rgba(5, 8, 20, 0)');
        
        ambientCtx.beginPath();
        ambientCtx.arc(orb.x, orb.y, orb.size, 0, Math.PI * 2);
        ambientCtx.fillStyle = grad;
        ambientCtx.fill();
      });
      
      ambientCtx.restore();
    }

    function spawnSpark(x, y, colorClass) {
      let color = '#00f2fe';
      if (colorClass === 'theme-magenta') color = '#ff2a85';
      if (colorClass === 'theme-yellow') color = '#ffd200';
      if (colorClass === 'theme-green') color = '#00e676';
      
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 2.5 + 0.8;
      
      particles.push({
        type: Math.random() < 0.35 ? 'star' : 'spark', // 35%の確率で星、他は通常のスパーク
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: Math.random() * 7 + 4,
        spikes: 4,
        rot: Math.random() * Math.PI,
        rotSpeed: 0.05,
        alpha: 1,
        decay: Math.random() * 0.025 + 0.015,
        color: color
      });
    }

    function spawnShockwave(x, y, colorClass) {
      let color = '#00f2fe';
      if (colorClass === 'theme-magenta') color = '#ff2a85';
      if (colorClass === 'theme-yellow') color = '#ffd200';
      if (colorClass === 'theme-green') color = '#00e676';

      shockwaves.push({
        x: x,
        y: y,
        radius: 5,
        maxRadius: 180,
        lineWidth: 20,
        alpha: 1,
        color: color
      });
      
      // 1. アメコミ星パーティクルの生成
      for (let i = 0; i < 35; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 7 + 3;
        particles.push({
          type: 'star',
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 14 + 10,
          spikes: 5,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.15,
          alpha: 1,
          decay: Math.random() * 0.012 + 0.008,
          color: color
        });
      }

      // 2. モコモコ煙（雲）パーティクルの生成
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1.5;
        particles.push({
          type: 'cloud',
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 16 + 12,
          alpha: 0.9,
          decay: Math.random() * 0.015 + 0.01,
          color: '#ffffff'
        });
      }
      
      flashOpacity = 0.75;
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97; // 少し減速率を高めてポップに
        p.vy *= 0.97;
        p.alpha -= p.decay;
        
        if (p.rot !== undefined && p.rotSpeed !== undefined) {
          p.rot += p.rotSpeed;
        }
        
        if (p.alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      
      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const sw = shockwaves[i];
        sw.radius += (sw.maxRadius - sw.radius) * 0.12;
        sw.lineWidth *= 0.92;
        sw.alpha -= 0.04;
        
        if (sw.alpha <= 0 || sw.lineWidth < 0.5) {
          shockwaves.splice(i, 1);
        }
      }
      
      if (flashOpacity > 0) {
        flashOpacity -= 0.03;
      }
    }

    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color, alpha) {
      let rot = Math.PI / 2 * 3;
      let x = cx;
      let y = cy;
      let step = Math.PI / spikes;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius);
      for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
      }
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
      
      ctx.fillStyle = color;
      ctx.strokeStyle = '#050814';
      ctx.lineWidth = 3.5;
      ctx.lineJoin = 'round';
      ctx.stroke();
      ctx.fill();
      ctx.restore();
    }

    function drawCloud(ctx, cx, cy, size, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(cx, cy, size * 0.7, 0, Math.PI * 2);
      ctx.arc(cx + size * 0.4, cy - size * 0.2, size * 0.6, 0, Math.PI * 2);
      ctx.arc(cx - size * 0.4, cy - size * 0.2, size * 0.6, 0, Math.PI * 2);
      ctx.closePath();
      
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#050814';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      ctx.stroke();
      ctx.fill();
      ctx.restore();
    }

    function drawParticles() {
      if (!particleCtx) return;
      const w = particleCanvas.width / (window.devicePixelRatio || 1);
      const h = particleCanvas.height / (window.devicePixelRatio || 1);
      
      particleCtx.clearRect(0, 0, w, h);
      
      const centerX = w / 2;
      const centerY = h / 2;
      
      // アメコミ衝撃波リング（太枠付き）
      shockwaves.forEach(sw => {
        particleCtx.save();
        particleCtx.beginPath();
        particleCtx.arc(centerX, centerY, sw.radius, 0, Math.PI * 2);
        particleCtx.strokeStyle = sw.color;
        particleCtx.lineWidth = sw.lineWidth;
        particleCtx.globalAlpha = sw.alpha;
        particleCtx.stroke();
        
        particleCtx.beginPath();
        particleCtx.arc(centerX, centerY, sw.radius + sw.lineWidth/2, 0, Math.PI * 2);
        particleCtx.strokeStyle = '#050814';
        particleCtx.lineWidth = 2.5;
        particleCtx.globalAlpha = sw.alpha;
        particleCtx.stroke();
        particleCtx.restore();
      });
      
      particles.forEach(p => {
        const px = centerX + p.x;
        const py = centerY + p.y;
        
        if (p.type === 'star') {
          drawStar(particleCtx, px, py, p.spikes || 5, p.size, p.size * 0.45, p.color, p.alpha);
        } else if (p.type === 'cloud') {
          drawCloud(particleCtx, px, py, p.size, p.alpha);
        } else {
          // 通常の火花（太枠付き）
          particleCtx.save();
          particleCtx.beginPath();
          particleCtx.arc(px, py, p.size, 0, Math.PI * 2);
          particleCtx.fillStyle = p.color;
          particleCtx.strokeStyle = '#050814';
          particleCtx.lineWidth = 1.5;
          particleCtx.globalAlpha = p.alpha;
          particleCtx.fill();
          particleCtx.stroke();
          particleCtx.restore();
        }
      });
      
      if (flashOpacity > 0) {
        particleCtx.save();
        particleCtx.fillStyle = '#ffffff';
        particleCtx.globalAlpha = flashOpacity;
        particleCtx.fillRect(0, 0, w, h);
        particleCtx.restore();
      }
    }

    function animate() {
      updateAmbientOrbs();
      drawAmbientOrbs();
      
      updateParticles();
      drawParticles();
      
      if (!isPaused && tasks.length > 0 && currentTaskIndex < tasks.length) {
        const currentTask = tasks[currentTaskIndex];
        const angle = ((remainingSeconds / totalDuration) * Math.PI * 2) - Math.PI / 2;
        const radius = 85;
        
        const sparkX = Math.cos(angle) * radius;
        const sparkY = Math.sin(angle) * radius;
        
        const isLastSpurt = remainingSeconds <= 10;
        const spawnRate = isLastSpurt ? 0.8 : 0.25;
        
        if (Math.random() < spawnRate) {
          spawnSpark(sparkX, sparkY, currentTask.theme);
          if (isLastSpurt) {
            spawnSpark(sparkX, sparkY, currentTask.theme);
          }
        }
      }
      
      animationFrameId = requestAnimationFrame(animate);
    }

    function startTimer() {
      if (tasks.length === 0) return;
      
      // 初回スタート時のみ爆発トリガー
      const currentTask = tasks[currentTaskIndex];
      if (remainingSeconds === totalDuration && isPaused) {
        triggerCartoonExplosion(isHiragana ? 'いくぞ！' : 'スタート！');
        spawnShockwave(0, 0, currentTask.theme);
      }
      
      isPaused = false;
      lastTimestamp = performance.now();
      accumulatedMs = 0;
      
      if (DOM.playPauseBtn) DOM.playPauseBtn.classList.add('pulse');
      if (DOM.playIcon) DOM.playIcon.textContent = '⏸️';
      if (DOM.playText) DOM.playText.textContent = isHiragana ? 'ストップ' : '一時停止';
      
      if (timerId) cancelAnimationFrame(timerId);
      timerId = requestAnimationFrame(runTimerLoop);
    }

    function pauseTimer() {
      isPaused = true;
      if (timerId) {
        cancelAnimationFrame(timerId);
        timerId = null;
      }
      
      if (DOM.playPauseBtn) DOM.playPauseBtn.classList.remove('pulse');
      if (DOM.playIcon) DOM.playIcon.textContent = '▶️';
      if (DOM.playText) DOM.playText.textContent = isHiragana ? 'スタート' : 'スタート';
      document.body.classList.remove('pulse-active');
    }

    function runTimerLoop(timestamp) {
      if (isPaused) return;
      
      const delta = timestamp - lastTimestamp;
      lastTimestamp = timestamp;
      accumulatedMs += delta;
      
      if (accumulatedMs >= 1000) {
        const elapsedSeconds = Math.floor(accumulatedMs / 1000);
        accumulatedMs %= 1000;
        
        remainingSeconds -= elapsedSeconds;
        
        if (remainingSeconds <= 0) {
          remainingSeconds = 0;
          updateTimerDisplay();
          handleTaskCompletion();
          return; 
        } else {
          if (countdownSoundEnabled && remainingSeconds <= 3) {
            playCountdownBeep(remainingSeconds === 0);
          }
          
          if (pulseEnabled && remainingSeconds <= 10) {
            document.body.classList.add('pulse-active');
          } else {
            document.body.classList.remove('pulse-active');
          }
          
          updateTimerDisplay();
        }
      }
      
      timerId = requestAnimationFrame(runTimerLoop);
    }

    function handleTaskCompletion() {
      pauseTimer();
      document.body.classList.remove('pulse-active');
      
      if (currentTaskIndex >= tasks.length) return;
      const completedTask = tasks[currentTaskIndex];
      
      spawnShockwave(0, 0, completedTask.theme);
      
      // 次のタスク名で爆発表示
      const nextIndex = currentTaskIndex + 1;
      let explosionText = '';
      if (nextIndex < tasks.length) {
        const nextTask = tasks[nextIndex];
        explosionText = isHiragana ? nextTask.nameHiragana : nextTask.nameKanji;
      } else {
        explosionText = loopEnabled ? (isHiragana ? 'もういっかい！' : '最初からループ！') : (isHiragana ? 'おしまい！' : 'おしまい！');
      }
      triggerCartoonExplosion(explosionText);
      
      if (DOM.chimeSelect) {
        playTransitionSound(DOM.chimeSelect.value);
      }
      
      setTimeout(() => {
        currentTaskIndex++;
        
        if (currentTaskIndex >= tasks.length) {
          if (loopEnabled) {
            currentTaskIndex = 0;
            loadTask(currentTaskIndex);
            startTimer();
          } else {
            currentTaskIndex = 0;
            loadTask(currentTaskIndex);
            alertUserAllDone();
          }
        } else {
          loadTask(currentTaskIndex);
          startTimer();
        }
      }, 1200);
    }

    function alertUserAllDone() {
      updateUI();
      triggerCartoonExplosion(isHiragana ? 'おしまい！' : 'おしまい！');
      setTimeout(() => {
        if (DOM.chimeSelect) {
          playTransitionSound(DOM.chimeSelect.value);
        }
      }, 500);
    }

    function loadTask(index) {
      if (index < 0 || index >= tasks.length) return;
      currentTaskIndex = index;
      const task = tasks[index];
      totalDuration = task.duration;
      remainingSeconds = totalDuration;
      
      updateActiveThemeColors(task.theme);
      updateUI();
    }

    function updateActiveThemeColors(themeClass) {
      const root = document.documentElement;
      
      let activeColor = '#00f2fe';
      let activeGlow = 'rgba(0, 242, 254, 0.35)';
      
      if (themeClass === 'theme-magenta') {
        activeColor = '#ff2a85';
        activeGlow = 'rgba(255, 42, 133, 0.35)';
      } else if (themeClass === 'theme-yellow') {
        activeColor = '#ffd200';
        activeGlow = 'rgba(255, 210, 0, 0.35)';
      } else if (themeClass === 'theme-green') {
        activeColor = '#00e676';
        activeGlow = 'rgba(0, 230, 118, 0.35)';
      }
      
      root.style.setProperty('--active-color', activeColor);
      root.style.setProperty('--active-glow', activeGlow);
    }

    function updateUI() {
      updateTimerDisplay();
      updateScheduleList();
      updateTimeline(); // 進行タイムラインを更新
      
      if (tasks.length === 0) {
        if (DOM.currentTaskTitle) DOM.currentTaskTitle.textContent = isHiragana ? 'タイマーをいれよう！' : 'タイマーを追加しよう！';
        if (DOM.taskBadge) DOM.taskBadge.textContent = isHiragana ? 'じゅんび中' : '準備中';
        if (DOM.nextTaskName) DOM.nextTaskName.textContent = isHiragana ? 'なし' : 'なし';
        if (DOM.nextTaskPreviewArea) DOM.nextTaskPreviewArea.style.opacity = '0';
        return;
      }
      
      if (currentTaskIndex >= tasks.length) return;
      const currentTask = tasks[currentTaskIndex];
      
      if (DOM.currentTaskTitle) {
        DOM.currentTaskTitle.textContent = isHiragana ? currentTask.nameHiragana : currentTask.nameKanji;
      }
      if (DOM.taskBadge) {
        DOM.taskBadge.textContent = isHiragana ? `じかん ${currentTaskIndex + 1}/${tasks.length}` : `時間 ${currentTaskIndex + 1}/${tasks.length}`;
      }
      
      const nextIndex = currentTaskIndex + 1;
      if (nextIndex < tasks.length) {
        const nextTask = tasks[nextIndex];
        if (DOM.nextTaskName) DOM.nextTaskName.textContent = isHiragana ? nextTask.nameHiragana : nextTask.nameKanji;
        if (DOM.nextTaskPreviewArea) DOM.nextTaskPreviewArea.style.opacity = '1';
      } else {
        if (loopEnabled) {
          const firstTask = tasks[0];
          if (DOM.nextTaskName) {
            DOM.nextTaskName.textContent = (isHiragana ? firstTask.nameHiragana : firstTask.nameKanji) + '（最初からループ）';
          }
          if (DOM.nextTaskPreviewArea) DOM.nextTaskPreviewArea.style.opacity = '1';
        } else {
          if (DOM.nextTaskName) DOM.nextTaskName.textContent = isHiragana ? 'おしまい' : 'おしまい';
          if (DOM.nextTaskPreviewArea) DOM.nextTaskPreviewArea.style.opacity = '0.5';
        }
      }
    }

    function updateTimerDisplay() {
      if (!DOM.countdownTime) return;
      const minutes = Math.floor(remainingSeconds / 60);
      const seconds = remainingSeconds % 60;
      
      const minStr = String(minutes).padStart(2, '0');
      const secStr = String(seconds).padStart(2, '0');
      
      DOM.countdownTime.textContent = minStr + ':' + secStr;
      
      if (DOM.progressRing && totalDuration > 0) {
        const ratio = remainingSeconds / totalDuration;
        const strokeDashoffset = RING_CIRCUMFERENCE * (1 - ratio);
        DOM.progressRing.style.strokeDashoffset = strokeDashoffset;
        DOM.progressRing.style.strokeDasharray = RING_CIRCUMFERENCE;
        
        if (remainingSeconds <= 10) {
          DOM.progressRing.style.stroke = 'url(#ring-gradient-danger)';
        } else if (remainingSeconds <= 30) {
          DOM.progressRing.style.stroke = 'url(#ring-gradient-warning)';
        } else {
          DOM.progressRing.style.stroke = 'url(#ring-gradient-ok)';
        }
      } else if (DOM.progressRing) {
        DOM.progressRing.style.strokeDashoffset = RING_CIRCUMFERENCE;
      }
    }

    function updateScheduleList() {
      if (!DOM.scheduleList) return;
      DOM.scheduleList.innerHTML = '';
      
      tasks.forEach((task, idx) => {
        const item = document.createElement('div');
        item.className = 'schedule-item ' + task.theme + ' ' + (idx === currentTaskIndex ? 'current-item' : '');
        
        const minutes = Math.floor(task.duration / 60);
        const seconds = task.duration % 60;
        const timeString = minutes + '分' + (seconds > 0 ? seconds + '秒' : '');
        const timeStringHiragana = minutes + 'ふん' + (seconds > 0 ? seconds + 'びょう' : '');
        
        const taskName = isHiragana ? task.nameHiragana : task.nameKanji;
        const durationLabel = isHiragana ? timeStringHiragana : timeString;
        
        item.innerHTML = `
          <div class="schedule-item-info">
            <span class="item-index">${idx + 1}</span>
            <span class="item-name">${escapeHTML(taskName)}</span>
            <span class="item-duration">${durationLabel}</span>
          </div>
          <div class="schedule-item-actions">
            <button class="action-btn move-up-btn" data-index="${idx}" title="上へ移動" aria-label="上へ移動">▲</button>
            <button class="action-btn move-down-btn" data-index="${idx}" title="下へ移動" aria-label="下へ移動">▼</button>
            <button class="action-btn delete-btn" data-index="${idx}" title="削除する" aria-label="削除する">🗑️</button>
          </div>
        `;
        
        DOM.scheduleList.appendChild(item);
      });
    }

    function updateTimeline() {
      if (!DOM.timelineContainer) return;
      DOM.timelineContainer.innerHTML = '';
      
      if (tasks.length <= 1) {
        DOM.timelineContainer.style.display = 'none';
        return;
      }
      
      const isFS = document.body.classList.contains('fullscreen-mode');
      DOM.timelineContainer.style.display = isFS ? 'flex' : 'flex';
      
      tasks.forEach((task, idx) => {
        const step = document.createElement('div');
        
        let status = 'future';
        if (idx < currentTaskIndex) {
          status = 'past';
        } else if (idx === currentTaskIndex) {
          status = 'active';
        }
        
        step.className = `timeline-step ${task.theme} ${status}`;
        
        const taskName = isHiragana ? task.nameHiragana : task.nameKanji;
        
        let indicatorHtml = '';
        if (status === 'past') {
          indicatorHtml = '<span class="step-indicator">✓</span>';
        } else if (status === 'active') {
          indicatorHtml = '<span class="step-indicator font-play">▶</span>';
        } else {
          indicatorHtml = `<span class="step-indicator">${idx + 1}</span>`;
        }
        
        step.innerHTML = `
          ${indicatorHtml}
          <span class="step-name">${escapeHTML(taskName)}</span>
        `;
        
        DOM.timelineContainer.appendChild(step);
        
        if (idx < tasks.length - 1) {
          const connector = document.createElement('div');
          connector.className = `timeline-connector ${idx < currentTaskIndex ? 'past' : 'future'}`;
          DOM.timelineContainer.appendChild(connector);
        }
      });
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    function setupEventListeners() {
      if (DOM.playPauseBtn) {
        DOM.playPauseBtn.addEventListener('click', () => {
          if (isPaused) {
            startTimer();
          } else {
            pauseTimer();
          }
        });
      }
      
      if (DOM.resetBtn) {
        DOM.resetBtn.addEventListener('click', () => {
          pauseTimer();
          loadTask(currentTaskIndex);
        });
      }
      
      if (DOM.skipBtn) {
        DOM.skipBtn.addEventListener('click', () => {
          pauseTimer();
          if (tasks.length === 0) return;
          
          const nextIndex = (currentTaskIndex + 1) % tasks.length;
          const nextTask = tasks[nextIndex];
          const explosionText = isHiragana ? nextTask.nameHiragana : nextTask.nameKanji;
          
          spawnShockwave(0, 0, tasks[currentTaskIndex].theme);
          triggerCartoonExplosion(explosionText);
          
          setTimeout(() => {
            currentTaskIndex = nextIndex;
            loadTask(currentTaskIndex);
          }, 200);
        });
      }

      if (DOM.langToggleBtn) {
        DOM.langToggleBtn.addEventListener('click', () => {
          isHiragana = !isHiragana;
          localStorage.setItem('intervaltimer_hiragana', isHiragana);
          updateLanguageToggleUI();
          updateUI();
        });
      }
      
      if (DOM.volumeSlider) {
        DOM.volumeSlider.addEventListener('input', (e) => {
          volume = parseFloat(e.target.value);
          localStorage.setItem('intervaltimer_volume', volume);
          if (volume > 0) {
            isMuted = false;
            if (DOM.muteIcon) DOM.muteIcon.textContent = '🔊';
          } else {
            if (DOM.muteIcon) DOM.muteIcon.textContent = '🔇';
          }
        });
      }
      
      if (DOM.muteBtn) {
        DOM.muteBtn.addEventListener('click', () => {
          isMuted = !isMuted;
          if (isMuted) {
            if (DOM.muteIcon) DOM.muteIcon.textContent = '🔇';
          } else {
            if (DOM.muteIcon) DOM.muteIcon.textContent = volume > 0 ? '🔊' : '🔇';
            playTone(600, 0.05, 'sine', 0.2);
          }
        });
      }

      if (DOM.fullscreenBtn) {
        DOM.fullscreenBtn.addEventListener('click', toggleFullscreen);
      }
      
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        
        if (e.code === 'Space') {
          e.preventDefault();
          if (DOM.playPauseBtn) DOM.playPauseBtn.click();
        } else if (e.code === 'KeyR') {
          if (DOM.resetBtn) DOM.resetBtn.click();
        } else if (e.code === 'KeyN') {
          if (DOM.skipBtn) DOM.skipBtn.click();
        } else if (e.code === 'KeyF') {
          if (DOM.fullscreenBtn) DOM.fullscreenBtn.click();
        }
      });

      if (DOM.scheduleList) {
        DOM.scheduleList.addEventListener('click', (e) => {
          const index = parseInt(e.target.dataset.index);
          if (isNaN(index)) return;
          
          if (e.target.classList.contains('delete-btn')) {
            deleteTask(index);
          } else if (e.target.classList.contains('move-up-btn')) {
            moveTask(index, -1);
          } else if (e.target.classList.contains('move-down-btn')) {
            moveTask(index, 1);
          }
        });
      }

      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const presetKey = btn.dataset.preset;
          loadPreset(presetKey);
        });
      });

      document.querySelectorAll('.quick-time-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const min = parseInt(btn.dataset.time);
          if (DOM.newMin) DOM.newMin.value = min;
          if (DOM.newSec) DOM.newSec.value = 0;
        });
      });

      if (DOM.addTaskForm) {
        DOM.addTaskForm.addEventListener('submit', (e) => {
          e.preventDefault();
          
          const nameKanji = DOM.newKanji ? DOM.newKanji.value.trim() : '';
          const nameHiragana = DOM.newHiragana ? DOM.newHiragana.value.trim() : '';
          const min = DOM.newMin ? (parseInt(DOM.newMin.value) || 0) : 0;
          const sec = DOM.newSec ? (parseInt(DOM.newSec.value) || 0) : 0;
          
          const duration = min * 60 + sec;
          if (duration <= 0) {
            alert(isHiragana ? '時間は1秒以上にしてください！' : '時間は1秒以上に設定してください！');
            return;
          }
          
          const themeRadio = document.querySelector('input[name="task-theme"]:checked');
          const theme = themeRadio ? themeRadio.value : 'theme-cyan';
          
          const newTask = {
            id: 'task_' + Date.now(),
            nameKanji: nameKanji,
            nameHiragana: nameHiragana,
            duration: duration,
            theme: theme
          };
          
          tasks.push(newTask);
          saveTasks();
          
          if (DOM.newKanji) DOM.newKanji.value = '';
          if (DOM.newHiragana) DOM.newHiragana.value = '';
          if (DOM.newMin) DOM.newMin.value = 5;
          if (DOM.newSec) DOM.newSec.value = 0;
          
          if (tasks.length === 1) {
            loadTask(0);
          } else {
            updateUI();
          }
        });
      }

      if (DOM.loopSwitch) {
        DOM.loopSwitch.addEventListener('change', (e) => {
          loopEnabled = e.target.checked;
          localStorage.setItem('intervaltimer_loop', loopEnabled);
          updateUI();
        });
      }
      
      if (DOM.pulseSwitch) {
        DOM.pulseSwitch.addEventListener('change', (e) => {
          pulseEnabled = e.target.checked;
          localStorage.setItem('intervaltimer_pulse', pulseEnabled);
          if (!pulseEnabled) {
            document.body.classList.remove('pulse-active');
          }
        });
      }

      if (DOM.countdownSoundSwitch) {
        DOM.countdownSoundSwitch.addEventListener('change', (e) => {
          countdownSoundEnabled = e.target.checked;
          localStorage.setItem('intervaltimer_countdown_sound', countdownSoundEnabled);
        });
      }
      
      if (DOM.chimeSelect) {
        DOM.chimeSelect.addEventListener('change', (e) => {
          localStorage.setItem('intervaltimer_chime', e.target.value);
          playTransitionSound(e.target.value);
        });
      }
    }

    function saveTasks() {
      localStorage.setItem('intervaltimer_tasks', JSON.stringify(tasks));
    }

    function deleteTask(index) {
      if (index < 0 || index >= tasks.length) return;
      
      tasks.splice(index, 1);
      saveTasks();
      
      if (tasks.length === 0) {
        pauseTimer();
        currentTaskIndex = 0;
        remainingSeconds = 0;
        totalDuration = 0;
      } else {
        if (currentTaskIndex >= tasks.length) {
          currentTaskIndex = tasks.length - 1;
        }
        
        if (index === currentTaskIndex) {
          loadTask(currentTaskIndex);
        } else if (index < currentTaskIndex) {
          currentTaskIndex--;
        }
      }
      
      updateUI();
    }

    function moveTask(index, direction) {
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= tasks.length) return;
      
      const temp = tasks[index];
      tasks[index] = tasks[targetIndex];
      tasks[targetIndex] = temp;
      
      saveTasks();
      
      if (currentTaskIndex === index) {
        currentTaskIndex = targetIndex;
      } else if (currentTaskIndex === targetIndex) {
        currentTaskIndex = index;
      }
      
      updateUI();
    }

    function loadPreset(key) {
      const presetData = PRESETS[key];
      if (!presetData) return;
      
      pauseTimer();
      
      tasks = presetData.map((item, idx) => ({
        id: 'preset_' + key + '_' + idx + '_' + Date.now(),
        nameKanji: item.nameKanji,
        nameHiragana: item.nameHiragana,
        duration: item.minutes * 60 + item.seconds,
        theme: item.theme
      }));
      
      saveTasks();
      loadTask(0);
    }

    function updateLanguageToggleUI() {
      const allTranslatableElements = document.querySelectorAll('[data-kanji][data-hiragana]');
      
      allTranslatableElements.forEach(el => {
        const text = isHiragana ? el.dataset.hiragana : el.dataset.kanji;
        
        if (el.tagName === 'INPUT') {
          el.placeholder = text;
        } else {
          const btnTextEl = el.querySelector('.btn-text, .control-text');
          if (btnTextEl) {
            btnTextEl.textContent = text;
          } else {
            el.textContent = text;
          }
        }
      });

      if (DOM.langToggleText) {
        DOM.langToggleText.textContent = isHiragana ? '漢字（かんじ）にする' : 'ひらがな にする';
      }
      if (DOM.appTitle) {
        DOM.appTitle.textContent = isHiragana ? 'ドキドキ！どはでタイマー' : 'ドキドキ！どはでタイマー';
      }
      if (DOM.fsHintOverlay) {
        DOM.fsHintOverlay.textContent = isHiragana ? DOM.fsHintOverlay.dataset.hiragana : DOM.fsHintOverlay.dataset.kanji;
      }
    }

    function triggerCartoonExplosion(text) {
      const container = document.getElementById('cartoon-explosion');
      const textEl = document.getElementById('explosion-text');
      if (!container || !textEl) return;
      
      textEl.textContent = text;
      
      // アニメーションのリセットと起動
      container.classList.remove('active');
      void container.offsetWidth; // リフロー強制
      container.classList.add('active');
      
      setTimeout(() => {
        container.classList.remove('active');
      }, 1300);
    }

    function showFullscreenHint() {
      const hint = DOM.fsHintOverlay;
      if (!hint) return;
      
      const isFS = document.body.classList.contains('fullscreen-mode');
      if (isFS) {
        hint.classList.add('show');
        // 4秒後に自動フェードアウト
        setTimeout(() => {
          hint.classList.remove('show');
        }, 4000);
      } else {
        hint.classList.remove('show');
      }
    }

    function toggleFullscreen() {
      const isFS = document.body.classList.contains('fullscreen-mode');
      
      if (!isFS) {
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) {
          docEl.requestFullscreen();
        } else if (docEl.webkitRequestFullscreen) {
          docEl.webkitRequestFullscreen();
        } else if (docEl.msRequestFullscreen) {
          docEl.msRequestFullscreen();
        }
        document.body.classList.add('fullscreen-mode');
        showFullscreenHint();
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        document.body.classList.remove('fullscreen-mode');
        showFullscreenHint();
      }
      
      setTimeout(resizeCanvases, 100);
    }

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        document.body.classList.remove('fullscreen-mode');
        showFullscreenHint();
        resizeCanvases();
      } else {
        document.body.classList.add('fullscreen-mode');
        showFullscreenHint();
        resizeCanvases();
      }
    });
  </script>
